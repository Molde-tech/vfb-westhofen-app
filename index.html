<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>VFB Westhofen App Firebase</title><style>
:root{--bg:#0d2016;--bg2:#132b1d;--card:#183523;--hi:#1f4028;--line:rgba(241,250,238,.16);--txt:#f1faee;--dim:#9bb6a4;--g:#4caf7d;--gold:#e3b23c;--r:#e2585a;--a:#d98a3d;--b:#6aa8ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}button,input,select{font:inherit}.app{max-width:540px;margin:auto;min-height:100vh;padding-bottom:88px}.head{position:sticky;top:0;z-index:3;background:var(--bg2);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}.brand{display:flex;gap:10px;align-items:center;min-width:0}.crest{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:#21472f;border:2px dashed var(--g);font-weight:900;color:var(--g)}.crest img{width:100%;height:100%;object-fit:cover}.title{font-weight:900;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chip{border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:999px;padding:8px 10px}.content{padding:16px}.divider{display:flex;align-items:center;gap:10px;margin:20px 0 12px;color:var(--dim);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.12em}.divider:before,.divider:after{content:'';flex:1;border-top:1px dashed var(--line)}.dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}.hi{background:var(--hi)}.alert{border-color:rgba(226,88,90,.55);background:rgba(226,88,90,.12)}.row{display:flex;justify-content:space-between;align-items:center;gap:10px}.muted{color:var(--dim);font-size:13px}.small{font-size:12px}.name{font-weight:800}.empty{text-align:center;color:var(--dim);padding:30px 10px}.btn{border:0;border-radius:12px;padding:11px 12px;font-weight:800}.btn-primary{background:var(--g);color:#07160e}.btn-ghost{background:transparent;color:var(--txt);border:1px solid var(--line)}.btn-red{background:var(--r);color:white}.btn-gold{background:var(--gold);color:#241902}.btn-amber{background:var(--a);color:#271203}.btn-blue{background:var(--b);color:#061321}.btn-block{width:100%}.btnrow{display:flex;gap:8px;margin-top:12px}.btnrow>*{flex:1}.badge{display:inline-block;border-radius:8px;padding:4px 8px;font-size:10px;font-weight:900;text-transform:uppercase}.admin{background:rgba(106,168,255,.16);color:var(--b)}.trainer{background:rgba(227,178,60,.18);color:var(--gold)}.cashier{background:rgba(217,138,61,.18);color:var(--a)}.playerbadge{background:rgba(76,175,125,.16);color:var(--g)}.training{background:rgba(76,175,125,.16);color:var(--g)}.spiel{background:rgba(227,178,60,.16);color:var(--gold)}.money{color:var(--gold);font-weight:900}.beer{color:var(--a);font-weight:900}.crate{font-weight:900;color:white}.nav{position:fixed;bottom:0;left:0;right:0;max-width:540px;margin:auto;background:var(--bg2);border-top:1px solid var(--line);display:flex;padding:8px 3px calc(8px + env(safe-area-inset-bottom));z-index:5}.nav button{flex:1;background:transparent;border:0;color:var(--dim);padding:8px 1px;border-radius:12px;font-size:10px;font-weight:900;text-transform:uppercase}.nav button.active{background:rgba(76,175,125,.1);color:var(--g)}.fab{position:fixed;right:calc(50% - 270px + 18px);bottom:94px;width:54px;height:54px;border-radius:50%;border:0;background:var(--g);font-size:30px;font-weight:900;color:#07160e}@media(max-width:580px){.fab{right:18px}}.sheetBg{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:10;display:flex;align-items:flex-end;justify-content:center}.sheet{width:100%;max-width:540px;max-height:88vh;overflow:auto;background:var(--bg2);border-radius:20px 20px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom))}.sheet h3{margin:0 0 14px;text-transform:uppercase}.field{margin-bottom:12px}.field label{display:block;color:var(--dim);font-size:11px;font-weight:900;text-transform:uppercase;margin-bottom:5px}input,select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:12px}.person{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}.person:last-child{border-bottom:0}.ava{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:var(--hi);border:1.5px dashed var(--g);color:var(--g);font-weight:900}.grow{flex:1}.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}.summary .card{margin:0}.rank{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}.rank:last-child{border-bottom:0}.hidden{display:none!important}.logoPreview{width:78px;height:78px;border-radius:50%;object-fit:cover;border:2px dashed var(--g)}
.tally{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1px;word-break:break-all;color:var(--a);font-weight:900}.mug{font-size:18px;margin-left:6px}.crateMuted{color:var(--dim);font-size:12px}.paid{background:rgba(76,175,125,.15);color:var(--g)}.open{background:rgba(226,88,90,.15);color:var(--r)}</style></head><body><div id="app"></div><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
const KEY='vfb_app_firebase_v1',OLD=['vfb_app_v5_1_final','vfb_app_v5_final','vfb_westhofen_app_v5','vfb_westhofen_app_v4','vfb_westhofen_app_v3','vfb_westhofen_app_v2','mannschafts_app_v2'],BEER=1;
const firebaseConfig={apiKey:"AIzaSyDXzKjeyfGAybqM015oINBPqjLk1TedE68",authDomain:"vfb-westhofen-app.firebaseapp.com",projectId:"vfb-westhofen-app",storageBucket:"vfb-westhofen-app.firebasestorage.app",messagingSenderId:"405760041608",appId:"1:405760041608:web:bd3d572508cede413bf53d"};
let cloudDoc=null,remoteStarted=false,applyingRemote=false;

const CATALOG=[['Keine Rückmeldung in App Spiel',6],['Keine Rückmeldung in App Training',3],['Unabgemeldet Spiel',50],['Falsches Outfit teilweise',2.5],['Trinken/Rauchen im Trikot',2],['Strafen verspätet zahlen pro Woche',2],['Rauchen in der Kabine',5],['Handyklingeln bei Besprechung',5],['Gelbe Karte wegen Dummheit/Meckern',10],['Falsches Outfit am Spieltag',5],['Diskutieren über Strafen',5],['Bier umstoßen',2],['Bier bunkern',5],['Beleidigung Mitspieler Training und Spiel',10],['Balldienst nicht ausgeführt',4],['Ball wegschießen',1],['Antrinken',2],['Unabgemeldet Training',10],['2x 20 Kontakte im Kreis',1],['20 Kontakte im Kreis',.5],['2x Tunnel',1],['Tunnel',.5],['19te verkackt',1],['Verspätung Spiel',1,true]].map((x,i)=>({id:'c'+i,name:x[0],amount:x[1],perMinute:!!x[2]}));
const ROSTER=['Alex Tönnies','Alexander Hueck','Alexander Vassiliou','Bilal Ekin','Björn','Daniel Pfeiffer','Dennis Hegemann','Ertunc Hezer','Faisal','Felix Schmidt','Hendrik','Jannis Rixen','Linge','Lorenzo','Marius Manecki','Mark Moldenhauer','Martin','Marvin Neumaier','Mike Zörnack','Miller','Nico Frustace','Nico Neumann','Pascal','Philipp Benke','Robin Becker','Schmiddi','Simon Jagiella','Tille','Tom Bras','TST','Yannick Hoffmann'].map((n,i)=>({id:'p'+i,name:n,nick:'',no:'',pin:'1234',role:i===0?'admin':'player',mustChangePin:true,creditBeer:0,creditFine:0}));
let db={team:{name:'VFB Westhofen',code:code(),logo:null},users:ROSTER,series:[],events:[],rsvps:{},catalog:CATALOG,charges:[],beers:[],crates:[],cash:[],me:null,verified:false},tab='home',sheet=null,edit=null,ok=false;
function code(){return Math.random().toString(36).slice(2,8).toUpperCase()}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}function init(){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');ok=true}catch(e){}try{firebase.initializeApp(firebaseConfig);cloudDoc=firebase.firestore().collection('apps').doc('vfb-westhofen')}catch(e){console.error('Firebase init Fehler',e)}}function save(){if(ok)localStorage.setItem(KEY,JSON.stringify(db));if(cloudDoc&&remoteStarted&&!applyingRemote){let cloudDb={...db};delete cloudDb.me;delete cloudDb.verified;cloudDoc.set({db:cloudDb,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(e=>console.error('Firebase save Fehler',e))}}function load(){if(remoteStarted)return;if(!ok)return;let raw=localStorage.getItem(KEY);if(!raw)for(const k of OLD){raw=localStorage.getItem(k);if(raw)break}if(raw)try{db={...db,...JSON.parse(raw)}}catch(e){}}function startRemote(){if(!cloudDoc)return;remoteStarted=true;cloudDoc.onSnapshot(s=>{if(s.exists&&s.data().db){applyingRemote=true;let myMe=db.me,myVerified=db.verified;db={...db,...s.data().db,me:myMe,verified:myVerified};ensure();applyingRemote=false;render()}else{save()}},e=>console.error('Firebase sync Fehler',e))}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function money(n){return Number(n||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'}function iso(d=new Date()){let y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`}function fmt(d){return new Date(d+'T00:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'})}function ini(n){return(n||'?').trim().split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase()}function me(){return db.users.find(u=>u.id===db.me)}
function role(u){return u?.role||(u?.admin?'admin':u?.cash?'cashier':'player')}function label(u){return{admin:'Admin',trainer:'Trainer',cashier:'Spieler/Kassenwart',player:'Spieler'}[role(u)]}function badge(u){return{admin:'admin',trainer:'trainer',cashier:'cashier',player:'playerbadge'}[role(u)]}function isAdmin(u=me()){return role(u)==='admin'}function canCash(u=me()){return['admin','trainer','cashier'].includes(role(u))}function canEvents(u=me()){return['admin','trainer'].includes(role(u))}function ensure(){db.team=db.team||{name:'VFB Westhofen',code:code()};db.users=db.users||[];db.series=db.series||[];db.events=db.events||[];db.rsvps=db.rsvps||{};db.catalog=(db.catalog&&db.catalog.length)?db.catalog:CATALOG;db.charges=db.charges||db.fines||[];db.beers=db.beers||[];db.crates=db.crates||[];db.cash=db.cash||db.deposits||[];db.users.forEach(u=>{if(!u.role)u.role=u.admin?'admin':u.cash?'cashier':'player';u.creditBeer=Number(u.creditBeer||0);u.creditFine=Number(u.creditFine||0);u.nick=u.nick||'';u.mustChangePin=!!u.mustChangePin});if(!db.series.length)db.series=[{id:uid(),weekday:2,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]},{id:uid(),weekday:4,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]}]}
function logo(){return db.team.logo?`<div class="crest"><img src="${db.team.logo}"></div>`:`<div class="crest">VFB</div>`}function allEvents(){let a=[...db.events];db.series.forEach(s=>{for(let i=-14;i<=90;i++){let d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+i);if(d.getDay()==s.weekday){let x=iso(d);if(!s.skip?.includes(x))a.push({id:'ser:'+s.id+':'+x,type:'training',date:x,time:s.time,end:s.end,place:s.place,note:s.note})}}});return a.sort((x,y)=>(x.date+x.time).localeCompare(y.date+y.time))}function upcoming(){return allEvents().filter(e=>e.date>=iso())}function past(){return allEvents().filter(e=>e.date<iso()).reverse()}function groups(id){let r=db.rsvps[id]||{},yes=[],no=[];db.users.forEach(u=>{if(r[u.id]?.s==='yes')yes.push(u);else if(r[u.id]?.s==='no')no.push({u,reason:r[u.id].reason||''})});let done=[...yes.map(u=>u.id),...no.map(x=>x.u.id)];return{yes,no,open:db.users.filter(u=>!done.includes(u.id))}}
function open(kind,id){return kind==='beer'?db.beers.filter(b=>b.user===id).reduce((s,b)=>s+Number(b.open||0),0):db.charges.filter(c=>c.user===id).reduce((s,c)=>s+Number(c.open||0),0)}function cash(kind){return db.cash.filter(c=>c.kind===kind).reduce((s,c)=>s+Number(c.amount||0),0)}function crates(id){return db.crates.filter(k=>k.user===id&&!k.done).length}function total(kind){return db.users.reduce((s,u)=>s+open(kind,u.id),0)}function totalCrates(){return db.users.reduce((s,u)=>s+crates(u.id),0)}function ub(id){let u=db.users.find(x=>x.id===id)||{};return{fineCredit:+(u.creditFine||0),beerCredit:+(u.creditBeer||0),fineOpen:open('fine',id),beerOpen:open('beer',id),crates:crates(id)}}function warnings(){return db.users.map(u=>({u,f:open('fine',u.id),b:open('beer',u.id)})).map(x=>({...x,t:x.f+x.b})).filter(x=>x.f>10||x.b>10||x.t>10).sort((a,b)=>b.t-a.t)}function warnUser(id){let x=ub(id),t=x.fineOpen+x.beerOpen;if(x.fineOpen<=10&&x.beerOpen<=10&&t<=10)return'';return`<div class="card alert"><b class="danger">⚠ Offener Betrag über 10 €</b><div class="muted small">Strafen: ${money(x.fineOpen)} · Bier: ${money(x.beerOpen)} · Gesamt: ${money(t)}</div><div class="muted small">Bitte beim Kassenwart melden.</div></div>`}function warnList(){if(!canCash())return'';let w=warnings();if(!w.length)return'';return`<div class="divider"><span class="dot"></span>⚠ Über 10 € offen<span></span></div><div class="card alert">${w.map(x=>`<div class="rank"><div><b>${esc(x.u.name)}</b><div class="muted small">Strafen ${money(x.f)} · Bier ${money(x.b)}</div></div><span class="danger">${money(x.t)}</span></div>`).join('')}</div>`}function summary(){return`<div class="summary"><div class="card hi"><div class="muted small">Strafen offen</div><div class="money">${money(total('fine'))}</div><div class="muted small">Strafenkasse Bestand</div><div class="money">${money(cash('fine'))}</div></div><div class="card hi"><div class="muted small">Bier offen</div><div class="beer">${money(total('beer'))}</div><div class="muted small">Bierkasse Bestand</div><div class="beer">${money(cash('beer'))}</div><div class="muted small">Offene Kisten: ${totalCrates()}</div></div></div>`}
function layout(body){let u=me();return`<div class="app"><div class="head"><div class="brand" onclick="openSheet('team')">${logo()}<div class="title">${esc(db.team.name)}</div></div>${u?`<button class="chip" onclick="openSheet('profile')">${esc(u.name.split(' ')[0])}</button>`:''}</div><div class="content">${body}</div>${fab()}${nav()}${sheet?renderSheet():''}</div>`}function nav(){return`<div class="nav"><button class="${tab==='home'?'active':''}" onclick="setTab('home')">Start</button><button class="${tab==='termine'?'active':''}" onclick="setTab('termine')">Termine</button><button class="${tab==='strafen'?'active':''}" onclick="setTab('strafen')">Strafen</button><button class="${tab==='bier'?'active':''}" onclick="setTab('bier')">Bier</button><button class="${tab==='striche'?'active':''}" onclick="setTab('striche')">Striche</button><button class="${tab==='stats'?'active':''}" onclick="setTab('stats')">Stats</button><button class="${tab==='kader'?'active':''}" onclick="setTab('kader')">Kader</button></div>`}function fab(){if(tab==='termine'&&canEvents())return`<button class="fab" onclick="openSheet('event')">+</button>`;if(tab==='strafen'&&canCash())return`<button class="fab" onclick="openSheet('charge')">+</button>`;if(tab==='kader'&&isAdmin())return`<button class="fab" onclick="openSheet('player')">+</button>`;return''}function setTab(t){tab=t;sheet=null;render()}function openSheet(s,e=null){sheet=s;edit=e;render()}function closeSheet(){sheet=null;edit=null;render()}
function render(){load();ensure();if(!db.users.length)return app.innerHTML=createView();if(!db.verified)return app.innerHTML=codeView();if(!db.me)return app.innerHTML=pickView();let __u=me();if(__u&&__u.mustChangePin)return app.innerHTML=forcePinView();let b=tab==='home'?home():tab==='termine'?termine():tab==='strafen'?strafen():tab==='bier'?bier():tab==='striche'?strichliste():tab==='stats'?stats():kader();app.innerHTML=layout(b)}function createView(){return`<div class="app"><div class="content" style="padding-top:70px"><div class="divider"><span class="dot"></span>Team gründen<span></span></div><div class="card hi"><div class="field"><label>Teamname</label><input id="team" value="VFB Westhofen"></div><div class="field"><label>Dein Name</label><input id="name"></div><div class="field"><label>PIN</label><input id="pin" type="password"></div><button class="btn btn-primary btn-block" onclick="createTeam()">Team gründen</button></div></div></div>`}function codeView(){return`<div class="app"><div class="content" style="padding-top:70px"><div class="divider"><span class="dot"></span>Einladungscode<span></span></div><div class="card hi"><div class="field"><label>Code</label><input id="codeInput" style="text-transform:uppercase" placeholder="${esc(db.team.code)}"></div><button class="btn btn-primary btn-block" onclick="verifyCode()">Weiter</button></div></div></div>`}function forcePinView(){let u=me();return`<div class="app"><div class="content" style="padding-top:70px"><div class="divider"><span class="dot"></span>PIN ändern (Pflicht)<span></span></div><div class="card hi"><p class="muted small">Hallo ${esc(u.name)}, das ist dein erster Login. Bitte vergib jetzt deine eigene PIN.</p><div class="field"><label>Neue PIN</label><input id="newPin1" type="password" autofocus></div><div class="field"><label>Neue PIN bestätigen</label><input id="newPin2" type="password"></div><button class="btn btn-primary btn-block" onclick="savePinChange()">PIN speichern</button><button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="db.me=null;save();render()">Anderer Benutzer</button></div></div></div>`}function savePinChange(){let p1=newPin1.value.trim(),p2=newPin2.value.trim();if(!p1||p1.length<4)return alert('Bitte eine PIN mit mind. 4 Zeichen vergeben.');if(p1!==p2)return alert('Die PINs stimmen nicht überein.');let u=me();u.pin=p1;u.mustChangePin=false;save();render()}function pickView(){return`<div class="app"><div class="head"><div class="brand">${logo()}<div class="title">${esc(db.team.name)}</div></div></div><div class="content"><div class="divider"><span class="dot"></span>Spieler anmelden<span></span></div><div class="card">${db.users.map(u=>personLine(u,true)).join('')}</div><div class="divider"><span class="dot"></span>Neu im Team<span></span></div><div class="card"><div class="field"><label>Name</label><input id="newName"></div><div class="field"><label>PIN</label><input id="newPin" type="password"></div><button class="btn btn-primary btn-block" onclick="joinTeam()">Beitreten</button></div></div>${sheet?renderSheet():''}</div>`}
function personLine(u,login=false){return`<div class="person"><div class="ava">${u.no||ini(u.name)}</div><div class="grow"><div class="name">${esc(u.name)}${u.nick?' „'+esc(u.nick)+'“':''}${u.id===db.me?' (du)':''}</div><span class="badge ${badge(u)}">${label(u)}</span></div>${login?`<button class="btn btn-primary" onclick="openSheet('login','${u.id}')">Anmelden</button>`:`${(isAdmin()||canEvents())?`<button class="btn btn-ghost" onclick="openSheet('editUser','${u.id}')">Ändern</button>`:''}`}</div>`}function createTeam(){let n=name.value.trim(),p=pin.value.trim();if(!n||!p)return alert('Name und PIN fehlen.');let id=uid();db={team:{name:team.value.trim()||'VFB Westhofen',code:code(),logo:null},users:[{id,name:n,nick:'',pin:p,role:'admin',mustChangePin:false,creditBeer:0,creditFine:0}],series:[{id:uid(),weekday:2,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]},{id:uid(),weekday:4,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]}],events:[],rsvps:{},catalog:CATALOG,charges:[],beers:[],crates:[],cash:[],me:id,verified:true};save();render()}function verifyCode(){if(codeInput.value.trim().toUpperCase()===db.team.code){db.verified=true;save();render()}else alert('Code falsch.')}function joinTeam(){let n=newName.value.trim(),p=newPin.value.trim();if(!n||!p)return alert('Name und PIN fehlen.');let id=uid();db.users.push({id,name:n,nick:'',pin:p,role:'player',mustChangePin:false,creditBeer:0,creditFine:0});db.me=id;save();render()}function doLogin(){let u=db.users.find(x=>x.id===edit);if(!u)return;if(String(u.pin)!==String(loginPin.value))return alert('PIN falsch.');db.me=u.id;save();closeSheet();render()}
function eventCard(e,past=false){let g=groups(e.id),r=(db.rsvps[e.id]||{})[db.me]||{},title=e.type==='spiel'?`vs. ${esc(e.opp||'?')}`:esc(e.note||'Training');return`<div class="card ${!past?'hi':''}"><div class="row"><span class="badge ${e.type}">${e.type==='spiel'?'Spiel':'Training'}</span><span class="muted small">${fmt(e.date)}${e.time?`, ${e.time}${e.end?'-'+e.end:''} Uhr`:''}</span></div><h3>${title}</h3><div class="muted">${esc(e.place||'')}</div>${!past?`<div class="btnrow"><button class="btn ${r.s==='yes'?'btn-primary':'btn-ghost'}" onclick="rsvp('${e.id}','yes')">Zusagen</button><button class="btn ${r.s==='no'?'btn-red':'btn-ghost'}" onclick="openSheet('reason','${e.id}')">Absagen</button></div>${r.s?`<button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="clearRsvp('${e.id}')">Antwort zurückziehen</button>`:''}`:''}<button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="openSheet('eventDetails','${e.id}')">Übersicht anzeigen</button><div class="muted small" style="margin-top:10px;border-top:1px solid var(--line);padding-top:8px"><span class="ok"><b>Kommt (${g.yes.length}):</b> ${g.yes.map(x=>esc(x.name.split(' ')[0])).join(', ')||'-'}</span><br><span class="danger"><b>Abgesagt (${g.no.length}):</b> ${g.no.map(x=>esc(x.u.name.split(' ')[0])).join(', ')||'-'}</span><br><b>Offen:</b> ${g.open.length}</div>${canEvents()?`<div class="btnrow"><button class="btn btn-ghost" onclick="editEvent('${e.id}')">Bearbeiten</button><button class="btn btn-red" onclick="delEvent('${e.id}')">Löschen</button></div>`:''}</div>`}

}')">Ändern</button><button class="btn btn-red" onclick="delCatalog('${c.id}')">X</button></div>`).join('')}<button class="btn btn-primary btn-block" onclick="openSheet('catalogItem')">+ Neue Strafe</button><button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="openSheet('team')">Zurück</button>`);if(sheet==='catalogItem'){let c=db.catalog.find(x=>x.id===edit)||{name:'',amount:'',perMinute:false};return sh(edit?'Strafe bearbeiten':'Neue Strafe',`<div class="field"><label>Name</label><input id="catName" value="${esc(c.name)}"></div><div class="field"><label>Betrag</label><input id="catAmount" type="number" step="0.5" value="${esc(c.amount)}"></div><label><input id="catMinute" type="checkbox" ${c.perMinute?'checked':''}> Betrag pro Minute</label><div class="btnrow"><button class="btn btn-ghost" onclick="openSheet('catalog')">Abbrechen</button><button class="btn btn-primary" onclick="saveCatalogItem()">Speichern</button></div>`)}if(sheet==='deposit'){let k=edit||'fine';return sh(k==='beer'?'Guthaben Bierkasse':'Guthaben Strafenkasse',`<div class="field"><label>Spieler</label><select id="depUser">${db.users.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('')}</select></div><div class="field"><label>Betrag</label><input id="depAmount" type="number" step="0.5"></div><div class="field"><label>Notiz</label><input id="depNote"></div><button class="btn btn-blue btn-block" onclick="saveDeposit('${k}')">Einzahlen</button>`)}if(sheet==='crate')return sh('Kiste eintragen',`<div class="field"><label>Spieler</label><select id="crateUser">${db.users.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('')}</select></div><div class="field"><label>Grund</label><select id="crateReason" onchange="toggleOtherCrate()"><option>Ausschießen verloren</option><option>Geburtstag</option><option>Tunnelhattrick</option><option>Anderer Grund</option></select></div><div class="field hidden" id="crateOtherWrap"><label>Anderer Grund</label><input id="crateOther"></div><div class="field"><label>Notiz</label><input id="crateNote"></div><button class="btn btn-amber btn-block" onclick="saveCrate()">Kiste speichern</button>`);if(sheet==='charge'){let c=db.charges.find(x=>x.id===edit)||{user:db.users[0]?.id,reason:'',amount:''};return sh(edit?'Strafe bearbeiten':'Strafe vergeben',`<div class="field"><label>Spieler</label><select id="fiUser">${db.users.map(u=>`<option value="${u.id}" ${c.user===u.id?'selected':''}>${esc(u.name)}</option>`).join('')}</select></div><div class="field"><label>Strafe auswählen</label><select id="fiPreset" onchange="presetCharge()"><option value="">Eigene Strafe</option>${db.catalog.map(x=>`<option value="${x.id}">${esc(x.name)} - ${x.perMinute?money(x.amount)+' / Min.':money(x.amount)}</option>`).join('')}</select></div><div class="field hidden" id="minuteWrap"><label>Minuten</label><input id="fiMinutes" type="number" min="1" value="1" oninput="presetCharge()"></div><div class="field"><label>Grund</label><input id="fiReason" value="${esc(c.reason)}"></div><div class="field"><label>Betrag</label><input id="fiAmount" type="number" step="0.5" value="${esc(c.amount)}"></div><button class="btn btn-gold btn-block" onclick="saveCharge()">Speichern</button>`)}if(sheet==='event'){let e=db.events.find(x=>x.id===edit)||{type:'training',date:iso(),time:'19:00',end:'20:30'};return sh(edit?'Termin bearbeiten':'Termin anlegen',`<div class="field"><label>Art</label><select id="evType"><option value="training" ${e.type==='training'?'selected':''}>Training</option><option value="spiel" ${e.type==='spiel'?'selected':''}>Spiel</option></select></div><div class="field"><label>Datum</label><input id="evDate" type="date" value="${e.date||iso()}"></div><div class="btnrow"><div class="field"><label>Start</label><input id="evTime" type="time" value="${e.time||''}"></div><div class="field"><label>Ende</label><input id="evEnd" type="time" value="${e.end||''}"></div></div><div class="field"><label>Ort</label><input id="evPlace" value="${esc(e.place||'')}"></div><div class="field"><label>Gegner</label><input id="evOpp" value="${esc(e.opp||'')}"></div><div class="field"><label>Notiz</label><input id="evNote" value="${esc(e.note||'')}"></div><button class="btn btn-primary btn-block" onclick="saveEvent()">Speichern</button>`)}if(sheet==='series'){let s=db.series.find(x=>x.id===edit)||{weekday:2,time:'19:00',end:'20:30',place:'',note:'Training'};return sh('Serie',`<div class="field"><label>Wochentag</label><select id="seWd">${['So','Mo','Di','Mi','Do','Fr','Sa'].map((w,i)=>`<option value="${i}" ${s.weekday==i?'selected':''}>${w}</option>`).join('')}</select></div><div class="btnrow"><div class="field"><label>Start</label><input id="seTime" type="time" value="${s.time}"></div><div class="field"><label>Ende</label><input id="seEnd" type="time" value="${s.end}"></div></div><div class="field"><label>Ort</label><input id="sePlace" value="${esc(s.place||'')}"></div><button class="btn btn-primary btn-block" onclick="saveSeries()">Speichern</button>`)}if(sheet==='eventDetails'){let e=allEvents().find(x=>x.id===edit),g=groups(edit);return sh('Terminübersicht',`<div class="card hi"><b>${e?.type==='spiel'?'Spiel':'Training'}</b><div class="muted small">${e?fmt(e.date):''} ${e?.time||''}</div></div><div class="listbox"><b class="ok">Kommt (${g.yes.length})</b><br>${g.yes.map(u=>esc(u.name)).join('<br>')||'-'}</div><div class="listbox"><b class="danger">Abgesagt (${g.no.length})</b><br>${g.no.map(x=>esc(x.u.name)+(x.reason?' – '+esc(x.reason):'')).join('<br>')||'-'}</div><div class="listbox"><b>Offen (${g.open.length})</b><br>${g.open.map(u=>esc(u.name)).join('<br>')||'-'}</div>`)}if(sheet==='reason')return sh('Absagen',`<div class="field"><label>Grund</label><input id="reason"></div><button class="btn btn-red btn-block" onclick="saveNo()">Absage speichern</button>`);if(sheet==='player')return sh('Spieler hinzufügen',`<div class="field"><label>Name</label><input id="plName"></div><div class="field"><label>Spitzname</label><input id="plNick"></div><div class="field"><label>PIN</label><input id="plPin"></div><div class="field"><label>Trikotnummer</label><input id="plNo"></div><div class="field"><label>Einteilung</label><select id="plRole"><option value="player">Spieler</option><option value="cashier">Spieler/Kassenwart</option><option value="trainer">Trainer</option><option value="admin">Admin</option></select></div><button class="btn btn-primary btn-block" onclick="savePlayer()">Hinzufügen</button>`);if(sheet==='editUser'){let u=db.users.find(x=>x.id===edit);return sh('Spieler bearbeiten',`<div class="field"><label>Name</label><input id="euName" value="${esc(u.name)}"></div><div class="field"><label>Spitzname</label><input id="euNick" value="${esc(u.nick||'')}"></div><div class="field"><label>Trikotnummer</label><input id="euNo" value="${esc(u.no||'')}"></div><div class="field"><label>Neue PIN</label><input id="euPin"></div><div class="field"><label>Rolle</label><select id="euRole" ${!isAdmin()?'disabled':''}><option value="player" ${role(u)==='player'?'selected':''}>Spieler</option><option value="cashier" ${role(u)==='cashier'?'selected':''}>Spieler/Kassenwart</option><option value="trainer" ${role(u)==='trainer'?'selected':''}>Trainer</option><option value="admin" ${role(u)==='admin'?'selected':''}>Admin</option></select></div><button class="btn btn-primary btn-block" onclick="saveEditUser()">Speichern</button>${canEvents()&&u.id!==db.me?`<button class="btn btn-red btn-block" style="margin-top:8px" onclick="delUser('${u.id}')">Spieler entfernen</button>`:''}`)}return''}function sh(t,b){return`<div class="sheetBg" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()"><h3>${t}</h3>${b}</div></div>`}
function rsvp(id,s){db.rsvps[id]=db.rsvps[id]||{};db.rsvps[id][db.me]={s};save();render()}function clearRsvp(id){if(db.rsvps[id])delete db.rsvps[id][db.me];save();render()}function saveNo(){let v=reason.value.trim();if(!v)return alert('Bitte Grund eingeben.');db.rsvps[edit]=db.rsvps[edit]||{};db.rsvps[edit][db.me]={s:'no',reason:v};save();closeSheet();render()}function saveEvent(){let o={id:edit||uid(),type:evType.value,date:evDate.value,time:evTime.value,end:evEnd.value,place:evPlace.value.trim(),opp:evOpp.value.trim(),note:evNote.value.trim()};if(edit){let i=db.events.findIndex(x=>x.id===edit);db.events[i]=o}else db.events.push(o);save();closeSheet();render()}function editEvent(id){if(id.startsWith('ser:'))return alert('Serien unten bearbeiten.');openSheet('event',id)}function delEvent(id){if(id.startsWith('ser:')){let[_,sid,d]=id.split(':');let s=db.series.find(x=>x.id===sid);if(s){s.skip=s.skip||[];s.skip.push(d)}}else db.events=db.events.filter(x=>x.id!==id);save();render()}function saveSeries(){let o={id:edit||uid(),weekday:+seWd.value,time:seTime.value,end:seEnd.value,place:sePlace.value.trim(),note:'Training',skip:[]};if(edit){let old=db.series.find(x=>x.id===edit);o.skip=old?.skip||[];db.series[db.series.findIndex(x=>x.id===edit)]=o}else db.series.push(o);save();closeSheet();render()}function delSeries(id){if(confirm('Serie löschen?')){db.series=db.series.filter(x=>x.id!==id);save();render()}}
function presetCharge(){let c=db.catalog.find(x=>x.id===fiPreset.value);if(!c)return;if(c.perMinute){minuteWrap.classList.remove('hidden');let m=+(fiMinutes.value||1);fiReason.value=c.name+' ('+m+' Min.)';fiAmount.value=(m*c.amount).toFixed(2)}else{minuteWrap.classList.add('hidden');fiReason.value=c.name;fiAmount.value=c.amount}}function fineCredit(id,amount){let u=db.users.find(x=>x.id===id),use=Math.min(u.creditFine,amount);u.creditFine-=use;return use}function saveCharge(){let amount=+fiAmount.value;if(!amount||!fiReason.value.trim())return alert('Grund und Betrag fehlen.');if(edit){let c=db.charges.find(x=>x.id===edit);c.user=fiUser.value;c.reason=fiReason.value.trim();c.amount=amount;c.open=Math.max(0,amount-(c.creditUsed||0))}else{let used=fineCredit(fiUser.value,amount);db.charges.push({id:uid(),user:fiUser.value,reason:fiReason.value.trim(),amount,creditUsed:used,open:Math.max(0,amount-used),date:iso()})}save();closeSheet();render()}function payCharge(id){let c=db.charges.find(x=>x.id===id);if(!c||c.open<=0)return;db.cash.push({id:uid(),kind:'fine',user:c.user,amount:c.open,date:iso(),note:'Strafe bezahlt'});c.creditUsed=(c.creditUsed||0)+c.open;c.open=0;save();render()}function delCharge(id){db.charges=db.charges.filter(x=>x.id!==id);save();render()}
function addBeer(id){let u=db.users.find(x=>x.id===id),use=Math.min(u.creditBeer,BEER);u.creditBeer-=use;db.beers.push({id:uid(),user:id,date:iso(),amount:BEER,creditUsed:use,open:Math.max(0,BEER-use)});save();render()}function removeLastBeer(id){let b=db.beers.filter(x=>x.user===id&&x.open>0).pop()||db.beers.filter(x=>x.user===id).pop();if(b)db.beers=db.beers.filter(x=>x.id!==b.id);save();render()}function payBeer(id){let sum=open('beer',id);if(sum<=0)return;db.cash.push({id:uid(),kind:'beer',user:id,amount:sum,date:iso(),note:'Bier bezahlt'});db.beers.forEach(b=>{if(b.user===id&&b.open>0){b.creditUsed=(b.creditUsed||0)+b.open;b.open=0}});save();render()}function saveDeposit(kind){let amount=+depAmount.value;if(!amount)return alert('Betrag fehlt.');let u=db.users.find(x=>x.id===depUser.value);if(kind==='beer')u.creditBeer+=amount;else u.creditFine+=amount;db.cash.push({id:uid(),kind,user:u.id,amount,date:iso(),note:depNote.value.trim()||'Guthaben'});save();closeSheet();render()}
function toggleOtherCrate(){crateReason.value==='Anderer Grund'?crateOtherWrap.classList.remove('hidden'):crateOtherWrap.classList.add('hidden')}function saveCrate(){let r=crateReason.value==='Anderer Grund'?(crateOther.value.trim()||'Anderer Grund'):crateReason.value;db.crates.push({id:uid(),user:crateUser.value,reason:r,note:crateNote.value.trim(),date:iso(),done:false});save();closeSheet();render()}function doneCrate(id){let k=db.crates.find(x=>x.id===id);if(k)k.done=true;save();render()}function delCrate(id){db.crates=db.crates.filter(x=>x.id!==id);save();render()}
function saveLegacy(){let f=+legacyFine.value||0,b=+legacyBeer.value||0;if(f)db.cash.push({id:uid(),kind:'fine',user:null,amount:f,date:iso(),note:'Altbestand Strafenkasse'});if(b)db.cash.push({id:uid(),kind:'beer',user:null,amount:b,date:iso(),note:'Altbestand Bierkasse'});save();openSheet('team')}function saveCatalogItem(){let name=catName.value.trim(),amount=+catAmount.value;if(!name||!amount)return alert('Name/Betrag fehlt.');if(edit){let c=db.catalog.find(x=>x.id===edit);Object.assign(c,{name,amount,perMinute:catMinute.checked})}else db.catalog.push({id:uid(),name,amount,perMinute:catMinute.checked});save();openSheet('catalog')}function delCatalog(id){if(confirm('Strafe löschen?')){db.catalog=db.catalog.filter(x=>x.id!==id);save();openSheet('catalog')}}function savePlayer(){let n=plName.value.trim(),p=plPin.value.trim();if(!n||!p)return alert('Name/PIN fehlen.');db.users.push({id:uid(),name:n,nick:plNick.value.trim(),pin:p,no:plNo.value.trim(),role:plRole.value,mustChangePin:true,creditBeer:0,creditFine:0});save();closeSheet();render()}function saveEditUser(){let u=db.users.find(x=>x.id===edit);u.name=euName.value.trim();u.nick=euNick.value.trim();u.no=euNo.value.trim();if(euPin.value.trim()){u.pin=euPin.value.trim();u.mustChangePin=true}if(isAdmin())u.role=euRole.value;save();closeSheet();render()}function delUser(id){if(confirm('Spieler entfernen?')){db.users=db.users.filter(x=>x.id!==id);save();render()}}function saveProfile(){let u=me();u.name=pfName.value.trim();u.nick=pfNick.value.trim();u.no=pfNo.value.trim();if(pfPin.value.trim())u.pin=pfPin.value.trim();save();closeSheet();render()}function saveTeam(){db.team.name=tmName.value.trim()||db.team.name;save();closeSheet();render()}function saveLogo(file){if(!file)return;let r=new FileReader();r.onload=()=>{db.team.logo=r.result;save();render()};r.readAsDataURL(file)}function setDefaultTrainingDays(){db.series=[{id:uid(),weekday:2,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]},{id:uid(),weekday:4,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]}];save();render()}function resetBeer(){if(!confirm('Bierkasse wirklich auf null setzen?'))return;db.beers=[];db.crates=[];db.cash=db.cash.filter(c=>c.kind!=='beer');db.users.forEach(u=>u.creditBeer=0);save();render()}function resetFine(){if(!confirm('Strafenkasse wirklich auf null setzen?'))return;db.charges=[];db.cash=db.cash.filter(c=>c.kind!=='fine');db.users.forEach(u=>u.creditFine=0);save();render()}function resetAll(){if(!confirm('Alle Kassen auf null setzen?'))return;db.beers=[];db.crates=[];db.charges=[];db.cash=[];db.users.forEach(u=>{u.creditBeer=0;u.creditFine=0});save();render()}function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='vfb-westhofen-backup.json';a.click()}function importData(file){let r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);save();render()}catch(e){alert('Backup konnte nicht gelesen werden.')}};r.readAsText(file)}
init();load();ensure();render();startRemote();
</script></body></html>
