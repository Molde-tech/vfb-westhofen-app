function open(kind,id){return kind==='beer'?db.beers.filter(b=>b.user===id).reduce((s,b)=>s+Number(b.open||0),0):db.charges.filter(c=>c.user===id).reduce((s,c)=>s+Number(c.open||0),0)}function openByType(id,type){return db.beers.filter(b=>b.user===id&&(b.dtype||'beer')===type).reduce((s,b)=>s+Number(b.open||0),0)}function cash(kind){return db.cash.filter(c=>c.kind===kind).filter(c=>{if(kind!=='beer')return true;let n=String(c.note||'');if(c.type==='consumption')return false;if(n.includes('Altbestand Guthaben'))return false;if(n.includes('Bier ausgegeben'))return false;if(n.includes('Bier-Entnahme'))return false;if(n.includes('bereits ausgegebene Biere'))return false;return true}).reduce((s,c)=>s+Number(c.amount||0),0)}function crates(id){return db.crates.filter(k=>k.user===id&&!k.done).length}function total(kind){let base=db.users.reduce((s,u)=>s+open(kind,u.id),0);if(kind==='beer')base+=Number(db.team.legacyBeerOpen||0);return base}function totalCredit(kind){return db.users.reduce((s,u)=>s+Number(kind==='beer'?(u.creditBeer||0):(u.creditFine||0)),0)}function totalCrates(){return db.users.reduce((s,u)=>s+crates(u.id),0)}function ub(id){let u=db.users.find(x=>x.id===id)||{};return{fineCredit:+(u.creditFine||0),beerCredit:+(u.creditBeer||0),fineOpen:open('fine',id),beerOpen:open('beer',id),crates:crates(id)}}function warnings(){return db.users.map(u=>({u,f:open('fine',u.id),b:open('beer',u.id)})).map(x=>({...x,t:x.f+x.b})).filter(x=>x.f>10||x.b>10||x.t>10).sort((a,b)=>b.t-a.t)}function warnUser(id){let x=ub(id),t=x.fineOpen+x.beerOpen;if(x.fineOpen<=10&&x.beerOpen<=10&&t<=10)return'';return`<div class="card alert"><b class="danger">⚠ Offener Betrag über 10 €</b><div class="muted small">Strafen: ${money(x.fineOpen)} · Bier: ${money(x.beerOpen)} · Gesamt: ${money(t)}</div><div class="muted small">Bitte beim Kassenwart melden.</div></div>`}function warnList(){if(!canCash())return'';let w=warnings();if(!w.length)return'';return`<div class="divider"><span class="dot"></spa function presetCharge(){let c=db.catalog.find(x=>x.id===fiPreset.value);if(!c){minuteWrap.classList.add('hidden');qtyWrap.classList.add('hidden');return}if(c.perMinute){minuteWrap.classList.remove('hidden');qtyWrap.classList.add('hidden');let m=+(fiMinutes.value||1);fiReason.value=c.name+' ('+m+' Min.)';fiAmount.value=(m*c.amount).toFixed(2)}else{minuteWrap.classList.add('hidden');qtyWrap.classList.remove('hidden');let q=+(fiQty.value||1);fiReason.value=c.name+(q>1?' ('+q+'x)':'');fiAmount.value=(q*c.amount).toFixed(2)}}function fineCredit(id,amount){let u=db.users.find(x=>x.id===id),use=Math.min(u.creditFine,amount);u.creditFine-=use;return use}
function processAutoFines(){let changed=false;allEvents().forEach(e=>{if(!isLocked(e))return;if(db.autoFined.includes(e.id))return;let g=groups(e.id),amount=e.type==='spiel'?AUTOFINE_SPIEL:AUTOFINE_TRAINING,label=e.type==='spiel'?'Keine Rückmeldung (Spiel) – automatisch':'Keine Rückmeldung (Training) – automatisch';g.open.forEach(u=>{let used=fineCredit(u.id,amount);db.charges.push({id:uid(),user:u.id,reason:label,amount,creditUsed:used,open:Math.max(0,amount-used),date:iso(),auto:true,eventId:e.id});logEntry('fine','Automatische Strafe: '+label+' ('+money(amount)+')',{user:u.id,amount})});db.autoFined.push(e.id);changed=true});return changed}function saveCharge(){let amount=+fiAmount.value;if(!amount||!fiReason.value.trim())return alert('Grund und Betrag fehlen.');if(edit){let c=db.charges.find(x=>x.id===edit);c.user=fiUser.value;c.reason=fiReason.value.trim();c.amount=amount;c.open=Math.max(0,amount-(c.creditUsed||0));logEntry('fine','Strafe bearbeitet: '+c.reason+' ('+money(amount)+')',{user:c.user,amount})}else{let ids=[...document.querySelectorAll('.fiUserCk:checked')].map(x=>x.value);if(!ids.length)return alert('Bitte mindestens einen Spieler auswählen.');ids.forEach(uidSel=>{let used=fineCredit(uidSel,amount);db.charges.push({id:uid(),user:uidSel,reason:fiReason.value.trim(),amount,creditUsed:used,open:Math.max(0,amount-used),date:iso()});logEntry('fine','Strafe eingetragen: '+fiReason.value.trim()+' ('+money(amount)+')',{user:uidSel,amount})})}save();closeSheet();render()}function payCharge(id){let c=db.charges.find(x=>x.id===id);if(!c||c.open<=0)return;db.cash.push({id:uid(),kind:'team',user:c.user,amount:c.open,date:iso(),note:'Strafe bezahlt: '+c.reason,type:'payment'});logEntry('fine','Strafe als bezahlt markiert: '+c.reason+' ('+money(c.open)+') → Mannschaftskasse',{user:c.user,amount:c.open});c.creditUsed=(c.creditUsed||0)+c.open;c.open=0;save();render()}function delCharge(id){let c=db.charges.find(x=>x.id===id);if(c)logEntry('fine','Strafe gelöscht: '+c.reason+' ('+money(c.amount)+')',{user:c.user,amount:c.amount});db.charges=db.charges.filter(x=>x.id!==id);save();render()}
function addBeer(id,qty,dtype){dtype=dtype==='sonstiges'?'sonstiges':'beer';let price=dtype==='sonstiges'?SONST:BEER,label=dtype==='sonstiges'?'Sonstiges':'Bier';let n=Math.max(1,Math.min(50,parseInt(qty)||1)),u=db.users.find(x=>x.id===id);for(let i=0;i<n;i++){let use=Math.min(Number(u.creditBeer||0),price);u.creditBeer=Number(u.creditBeer||0)-use;db.beers.push({id:uid(),user:id,date:iso(),amount:price,creditUsed:use,open:Math.max(0,price-use),reconciled:true,dtype})}logEntry('beer',n>1?n+'x '+label+' eingetragen':label+' eingetragen',{user:id,amount:n*price});save();render()}function removeLastBeer(id){let b=db.beers.filter(x=>x.user===id&&x.open>0).pop()||db.beers.filter(x=>x.user===id).pop();if(b){let u=db.users.find(x=>x.id===id);if(u&&b.creditUsed)u.creditBeer=Number(u.creditBeer||0)+Number(b.creditUsed||0);logEntry('beer','Bier-Eintrag entfernt',{user:id,amount:b.amount});db.beers=db.beers.filter(x=>x.id!==b.id)}save();render()}function saveDeposit(kind){let amount=+depAmount.value;if(!amount)return alert('Betrag fehlt.');let u=db.users.find(x=>x.id===depUser.value),remaining=amount,list=kind==='beer'?db.beers:db.charges,settled=[];list.filter(c=>c.user===u.id&&c.open>0).sort((a,b)=>a.date.localeCompare(b.date)).forEach(c=>{if(remaining<=0)return;let pay=Math.min(c.open,remaining);c.creditUsed=(c.creditUsed||0)+pay;c.open-=pay;remaining-=pay;settled.push({id:c.id,amount:pay})});let settledTotal=amount-remaining,gid=uid();if(kind==='beer'){u.creditBeer+=remaining;db.cash.push({id:uid(),kind,user:u.id,amount,date:iso(),note:depNote.value.trim()||'Guthaben',type:'deposit',creditAdded:remaining,settled,groupId:gid})}else{u.creditFine+=remaining;if(settledTotal>0)db.cash.push({id:uid(),kind:'team',user:u.id,amount:settledTotal,date:iso(),note:'Strafe(n) beglichen (aus Einzahlung von '+esc(u.name)+')',type:'payment',settled,groupId:gid,creditAdded:0});if(remaining>0)db.cash.push({id:uid(),kind:'fine',user:u.id,amount:remaining,date:iso(),note:depNote.value.trim()||'Guthaben',type:'deposit',creditAdded:remaining,settled:[],groupId:gid})}logEntry(kind,'Guthaben eingezahlt ('+money(amount)+')'+(settled.length?' · davon '+money(settledTotal)+' auf offene Beträge angerechnet'+(kind==='fine'?' (→ Mannschaftskasse)':''):''),{user:u.id,amount});save();closeSheet();render()}function reconcileBeerCash(){db.beers.forEach(b=>{if(!b.legacy)b.reconciled=true});save();render();alert('Nicht mehr nötig: Bierverbrauch verändert den Kassenbestand nicht mehr.')}  
function settleExisting(kind,id){let u=db.users.find(x=>x.id===id);if(!u)return;let credit=kind==='beer'?Number(u.creditBeer||0):Number(u.creditFine||0);if(credit<=0)return;let list=kind==='beer'?db.beers:db.charges,remaining=credit;list.filter(c=>c.user===id&&c.open>0).sort((a,b)=>a.date.localeCompare(b.date)).forEach(c=>{if(remaining<=0)return;let pay=Math.min(c.open,remaining);c.creditUsed=(c.creditUsed||0)+pay;c.open-=pay;remaining-=pay});let used=credit-remaining;if(!used)return alert('Keine offenen Beträge zum Verrechnen vorhanden.');if(kind==='beer')u.creditBeer=remaining;else{u.creditFine=remaining;db.cash.push({id:uid(),kind:'team',user:id,amount:used,date:iso(),note:'Strafe(n) beglichen (aus Guthaben von '+esc(u.name)+')',type:'payment'})}logEntry(kind,'Bestehendes Guthaben mit offenem Betrag verrechnet ('+money(used)+')'+(kind==='fine'?' → Mannschaftskasse':''),{user:id,amount:used});save();render()}
function delDeposit(id){let c=db.cash.find(x=>x.id===id);if(!c)return;if(!confirm('Guthaben-Eintrag wirklich löschen? Die Buchung wird komplett rückgängig gemacht (Guthaben-Anteil, ggf. Mannschaftskassen-Anteil und getilgte offene Beträge).'))return;let group=c.groupId?db.cash.filter(x=>x.groupId===c.groupId):[c],u=db.users.find(x=>x.id===c.user);group.forEach(entry=>{if(u){let creditAdded=typeof entry.creditAdded==='number'?entry.creditAdded:0;if(entry.kind==='beer')u.creditBeer=Number(u.creditBeer||0)-creditAdded;else if(entry.kind==='fine')u.creditFine=Number(u.creditFine||0)-creditAdded;let list=entry.kind==='beer'?db.beers:db.charges;(entry.settled||[]).forEach(s=>{let e2=list.find(x=>x.id===s.id);if(e2){e2.open=Number(e2.open||0)+s.amount;e2.creditUsed=Math.max(0,Number(e2.creditUsed||0)-s.amount)}})}});logEntry(c.kind,'Guthaben gelöscht ('+money(c.amount)+')',{user:c.user,amount:c.amount});let ids=group.map(x=>x.id);db.cash=db.cash.filter(x=>!ids.includes(x.id));save();render()}
function sonderList(kind){let list=db.cash.filter(c=>c.special&&c.kind===kind).sort((a,b)=>b.date.localeCompare(a.date));return list.length?list.map(c=>`<div class="sonder"><div><b>${esc(c.note||(c.amount>=0?'Einnahme':'Ausgabe'))}</b><div class="muted small">${fmt(c.date)}</div></div><div style="text-align:right"><span class="amt ${c.amount>=0?'in':'out'}">${c.amount>=0?'+':''}${money(c.amount)}</span>${canCash()?`<div><button class="btn btn-ghost" style="padding:4px 8px;font-size:11px;margin-top:4px" onclick="delSonder('${c.id}')">Löschen</button></div>`:''}</div></div>`).join(''):'<div class="empty">Keine Sonderbuchungen.</div>'}
function depositList(kind){let list=db.cash.filter(c=>c.kind===kind&&(c.type==='deposit'||(!c.type&&!c.special&&c.user&&c.note!=='Strafe bezahlt'&&c.note!=='Bier bezahlt'))).sort((a,b)=>b.date.localeCompare(a.date));return list.length?list.map(c=>{let u=db.users.find(x=>x.id===c.user);return`<div class="sonder"><div><b>${esc(u?.name||'?')}</b><div class="muted small">${esc(c.note||'Guthaben')} · ${fmt(c.date)}</div></div><div style="text-align:right"><span class="amt in">+${money(c.amount)}</span>${canCash()?`<div><button class="btn btn-ghost" style="padding:4px 8px;font-size:11px;margin-top:4px" onclick="delDeposit('${c.id}')">Löschen</button></div>`:''}</div></div>`}).join(''):'<div class="empty">Kein Guthaben eingezahlt.</div>'}
function saveSonder(fixedKind){let kind=fixedKind||(document.getElementById('sonKind')?sonKind.value:'fine');let amount=Math.abs(+sonAmount.value||0);if(!amount)return alert('Betrag fehlt.');if(!sonNote.value.trim())return alert('Bitte Bezeichnung/Grund angeben.');let isOut=sonType.value==='ausgabe';if(isOut)amount=-amount;db.cash.push({id:uid(),kind,user:null,amount,date:iso(),note:sonNote.value.trim(),special:true,type:'special'});logEntry(kind,'Sonderbuchung ('+(isOut?'Ausgabe':'Einnahme')+'): '+sonNote.value.trim()+' ('+money(amount)+')',{amount});save();closeSheet();render()}
function delSonder(id){let c=db.cash.find(x=>x.id===id);if(!c)return;if(confirm('Sonderbuchung wirklich löschen?')){logEntry(c.kind,'Sonderbuchung gelöscht: '+(c.note||'')+' ('+money(c.amount)+')',{amount:c.amount});db.cash=db.cash.filter(x=>x.id!==id);save();render()}}
function toggleOtherCrate(){crateReason.value==='Anderer Grund'?crateOtherWrap.classList.remove('hidden'):crateOtherWrap.classList.add('hidden')}function saveCrate(){let r=crateReason.value==='Anderer Grund'?(crateOther.value.trim()||'Anderer Grund'):crateReason.value;db.crates.push({id:uid(),user:crateUser.value,reason:r,note:crateNote.value.trim(),date:iso(),done:false});save();closeSheet();render()}function doneCrate(id){let k=db.crates.find(x=>x.id===id);if(k)k.done=true;save();render()}function delCrate(id){db.crates=db.crates.filter(x=>x.id!==id);save();render()}
function saveLegacyPlayers(){db.users.forEach(u=>{let fo=+((document.getElementById('lpFineOpen_'+u.id)||{}).value)||0,fc=+((document.getElementById('lpFineCredit_'+u.id)||{}).value)||0,bo=+((document.getElementById('lpBeerOpen_'+u.id)||{}).value)||0,bc=+((document.getElementById('lpBeerCredit_'+u.id)||{}).value)||0;if(fo){db.charges.push({id:uid(),user:u.id,reason:'Altbestand (Vorsaison)',amount:fo,creditUsed:0,open:fo,date:iso(),legacy:true});logEntry('fine','Altbestand (Vorsaison) übernommen: offen '+money(fo),{user:u.id,amount:fo})}if(fc){u.creditFine=Number(u.creditFine||0)+fc;db.cash.push({id:uid(),kind:'fine',user:u.id,amount:fc,date:iso(),note:'Altbestand Guthaben (Vorsaison)',type:'deposit'});logEntry('fine','Altbestand (Vorsaison) übernommen: Guthaben '+money(fc),{user:u.id,amount:fc})}if(bo){db.beers.push({id:uid(),user:u.id,date:iso(),amount:bo,creditUsed:0,open:bo,legacy:true});logEntry('beer','Altbestand (Vorsaison) übernommen: offen '+money(bo),{user:u.id,amount:bo})}if(bc){u.creditBeer=Number(u.creditBeer||0)+bc;logEntry('beer','Altbestand (Vorsaison) übernommen: Guthaben '+money(bc),{user:u.id,amount:bc})}});save();alert('Altbestände übernommen.');openSheet('team')}
function saveLegacy(){let f=+legacyFine.value||0,b=+legacyBeer.value||0,bo=+legacyBeerOpen.value||0,bc=+legacyBeerCredit.value||0;if(f){db.cash.push({id:uid(),kind:'team',user:null,amount:f,date:iso(),note:'Altbestand Strafenkasse (Vorsaison)'});logEntry('fine','Altbestand übernommen: '+money(f)+' → Mannschaftskasse')}if(b){db.cash.push({id:uid(),kind:'beer',user:null,amount:b,date:iso(),note:'Altbestand Bierkasse'});logEntry('beer','Altbestand übernommen: Bestand '+money(b))}if(bo){db.team.legacyBeerOpen=(db.team.legacyBeerOpen||0)+bo;logEntry('beer','Altbestand übernommen: offen '+money(bo))}if(bc){db.team.legacyBeerCredit=(db.team.legacyBeerCredit||0)+bc;logEntry('beer','Altbestand übernommen: Guthaben '+money(bc))}save();openSheet('team')}function saveCatalogItem(){let name=catName.value.trim(),amount=+catAmount.value;if(!name||!amount)return alert('Name/Betrag fehlt.');if(edit){let c=db.catalog.find(x=>x.id===edit),oldName=c.name;Object.assign(c,{name,amount,perMinute:catMinute.checked});if(oldName!==name){db.catalogDeleted=db.catalogDeleted||[];if(!db.catalogDeleted.includes(oldName))db.catalogDeleted.push(oldName)}}else db.catalog.push({id:uid(),name,amount,perMinute:catMinute.checked});save();openSheet('catalog')}function delCatalog(id){if(confirm('Strafe löschen?')){let c=db.catalog.find(x=>x.id===id);if(c){db.catalogDeleted=db.catalogDeleted||[];if(!db.catalogDeleted.includes(c.name))db.catalogDeleted.push(c.name)}db.catalog=db.catalog.filter(x=>x.id!==id);save();openSheet('catalog')}}function savePlayer(){let n=plName.value.trim(),p=plPin.value.trim();if(!n||!p)return alert('Name/PIN fehlen.');db.users.push({id:uid(),name:n,nick:plNick.value.trim(),pin:p,no:plNo.value.trim(),role:plRole.value,mustChangePin:true,creditBeer:0,creditFine:0});save();closeSheet();render()}function saveEditUser(){let u=db.users.find(x=>x.id===edit);u.name=euName.value.trim();u.nick=euNick.value.trim();u.no=euNo.value.trim();if(euPin.value.trim()){u.pin=euPin.value.trim();u.mustChangePin=true}if(isAdmin())u.role=euRole.value;save();closeSheet();render()}function delUser(id){if(confirm('Spieler entfernen?')){db.users=db.users.filter(x=>x.id!==id);save();render()}}function saveProfile(){let u=me();u.name=pfName.value.trim();u.nick=pfNick.value.trim();u.no=pfNo.value.trim();if(pfPin.value.trim())u.pin=pfPin.value.trim();save();closeSheet();render()}function saveTeam(){db.team.name=tmName.value.trim()||db.team.name;save();closeSheet();render()}function saveLogo(file){if(!file)return;let r=new FileReader();r.onload=()=>{db.team.logo=r.result;save();render()};r.readAsDataURL(file)}function setDefaultTrainingDays(){db.series=[{id:uid(),weekday:2,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]},{id:uid(),weekday:4,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]}];save();render()}function resetBeer(){if(prompt('ACHTUNG: Das löscht wirklich ALLE Bier-Einträge, Kisten und Kassenbuchungen der Bierkasse unwiderruflich. Zum Bestätigen "LÖSCHEN" eingeben:')!=='LÖSCHEN')return;logEntry('beer','⚠ BIERKASSE KOMPLETT ZURÜCKGESETZT (alle Einträge gelöscht)');db.beers=[];db.crates=[];db.cash=db.cash.filter(c=>c.kind!=='beer');db.users.forEach(u=>u.creditBeer=0);save();render()}function resetFine(){if(prompt('ACHTUNG: Das löscht wirklich ALLE Strafen und Kassenbuchungen der Strafenkasse unwiderruflich. Zum Bestätigen "LÖSCHEN" eingeben:')!=='LÖSCHEN')return;logEntry('fine','⚠ STRAFENKASSE KOMPLETT ZURÜCKGESETZT (alle Einträge gelöscht)');db.charges=[];db.cash=db.cash.filter(c=>c.kind!=='fine');db.users.forEach(u=>u.creditFine=0);save();render()}function resetAll(){if(prompt('ACHTUNG: Das löscht wirklich ALLE Strafen, Biere und Kassenbuchungen unwiderruflich. Zum Bestätigen "LÖSCHEN" eingeben:')!=='LÖSCHEN')return;logEntry('fine','⚠ ALLE KASSEN KOMPLETT ZURÜCKGESETZT (alle Einträge gelöscht)');db.beers=[];db.crates=[];db.charges=[];db.cash=[];db.users.forEach(u=>{u.creditBeer=0;u.creditFine=0});save();render()}function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='vfb-westhofen-backup.json';a.click()}function exportLog(){let list=[...(db.log||[])].filter(l=>!logFilter||l.user===logFilter).sort((a,b)=>b.ts.localeCompare(a.ts));let lines=list.map(l=>{let by=db.users.find(x=>x.id===l.by),u=l.user?db.users.find(x=>x.id===l.user):null,d=new Date(l.ts),datum=d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr';return datum+' | '+(l.kind==='beer'?'Bier':'Strafe')+(u?' | '+u.name:'')+' | '+l.text+' | von '+(by?.name||'Unbekannt')});let header='Protokoll Strafen & Bier'+(logFilter?' – '+(db.users.find(u=>u.id===logFilter)?.name||''):'')+' – '+db.team.name+'\n'+new Date().toLocaleString('de-DE')+'\n'+'='.repeat(40)+'\n\n';let content=header+(lines.length?lines.join('\n'):'Keine Einträge.');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:'text/plain;charset=utf-8'}));a.download='protokoll'+(logFilter?'-'+(db.users.find(u=>u.id===logFilter)?.name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-'):'')+'-'+iso()+'.txt';a.click()}function importData(file){let r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);save();render()}catch(e){alert('Backup konnte nicht gelesen werden.')}};r.readAsText(file)}
