<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VFB Westhofen Mannschafts-App V3</title>
<style>
:root{--bg:#0D2016;--bg2:#132B1D;--card:#183523;--hi:#1F4028;--line:rgba(241,250,238,.14);--text:#F1FAEE;--dim:#9BB6A4;--green:#4CAF7D;--gold:#E3B23C;--red:#E2585A;--amber:#D98A3D;--blue:#6AA8FF}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}button,input,select,textarea{font:inherit}.app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:86px}.head{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--line);z-index:3;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:10px;min-width:0;cursor:pointer}.crest{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;border:2px dashed var(--green);background:#21472f;color:var(--green);font-weight:900;overflow:hidden}.crest img{width:100%;height:100%;object-fit:cover}.title{font-weight:900;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 10px;color:var(--text);font-size:13px}.content{padding:16px}.divider{display:flex;align-items:center;gap:10px;color:var(--dim);margin:18px 0 12px;text-transform:uppercase;font-size:11px;font-weight:900;letter-spacing:.12em}.divider:before,.divider:after{content:'';height:1px;border-top:1px dashed var(--line);flex:1}.dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}.card.hi{background:var(--hi)}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.muted{color:var(--dim);font-size:13px}.small{font-size:12px}.name{font-weight:800}.empty{text-align:center;color:var(--dim);padding:28px 12px}.badge{display:inline-block;font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;border-radius:8px;padding:4px 8px}.training{background:rgba(76,175,125,.16);color:var(--green)}.spiel{background:rgba(227,178,60,.16);color:var(--gold)}.adminBadge{background:rgba(106,168,255,.16);color:var(--blue)}.trainerBadge{background:rgba(227,178,60,.16);color:var(--gold)}.cashBadge{background:rgba(217,138,61,.16);color:var(--amber)}.playerBadge{background:rgba(76,175,125,.16);color:var(--green)}.btn{border:0;border-radius:12px;padding:11px 12px;font-weight:800;cursor:pointer}.btn-primary{background:var(--green);color:#08180f}.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line)}.btn-red{background:var(--red);color:#fff}.btn-gold{background:var(--gold);color:#261903}.btn-amber{background:var(--amber);color:#271203}.btn-blue{background:var(--blue);color:#061321}.btn-block{width:100%}.btnrow{display:flex;gap:8px;margin-top:12px}.btnrow>*{flex:1}.nav{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:var(--bg2);border-top:1px solid var(--line);display:flex;padding:8px 3px calc(8px + env(safe-area-inset-bottom));z-index:4}.nav button{flex:1;background:transparent;border:0;color:var(--dim);padding:8px 2px;border-radius:12px;font-size:11px;font-weight:900;text-transform:uppercase}.nav button.active{color:var(--green);background:rgba(76,175,125,.10)}.fab{position:fixed;right:calc(50% - 260px + 18px);bottom:92px;width:54px;height:54px;border-radius:50%;border:0;background:var(--green);color:#07160e;font-size:30px;font-weight:900;box-shadow:0 10px 25px rgba(0,0,0,.35);z-index:5}@media(max-width:560px){.fab{right:18px}}.sheetBg{position:fixed;inset:0;background:rgba(0,0,0,.58);display:flex;align-items:flex-end;justify-content:center;z-index:8}.sheet{width:100%;max-width:520px;max-height:88vh;overflow:auto;background:var(--bg2);border-radius:20px 20px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom))}.sheet h3{margin:0 0 14px;text-transform:uppercase;letter-spacing:.05em}.field{margin-bottom:12px}.field label{display:block;color:var(--dim);font-size:11px;margin-bottom:5px;text-transform:uppercase;font-weight:900;letter-spacing:.08em}input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;color:var(--text);padding:12px}input:focus,select:focus,textarea:focus{outline:2px solid rgba(76,175,125,.35);border-color:var(--green)}.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;border:1.5px dashed var(--green);color:var(--green);background:var(--hi);font-weight:900;flex:0 0 auto}.avatar.admin{border-color:var(--blue);color:var(--blue)}.avatar.trainer{border-color:var(--gold);color:var(--gold)}.avatar.cashier{border-color:var(--amber);color:var(--amber)}.player{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}.player:last-child{border-bottom:0}.grow{flex:1}.pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:900}.paid{background:rgba(76,175,125,.15);color:var(--green)}.open{background:rgba(226,88,90,.15);color:var(--red)}.danger{color:var(--red)}.ok{color:var(--green)}.money{font-weight:900;color:var(--gold)}.beer{font-weight:900;color:var(--amber)}.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}.summary .card{margin:0}.listbox{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:8px}.logoPreview{width:78px;height:78px;border-radius:50%;object-fit:cover;border:2px dashed var(--green);background:var(--card)}.hidden{display:none!important}.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.quick button{font-size:12px;padding:7px 9px}.warn{border-color:rgba(226,88,90,.45);background:rgba(226,88,90,.08)}
</style>
</head>
<body><div id="app"></div>
<script>
const KEY='vfb_westhofen_app_v3';
const BEER_PRICE=1;
const PRESETS=[
 {name:'Tunnel',amount:1},
 {name:'20er',amount:0.5},
 {name:'Verspätung Spiel',amount:1,perMinute:true},
 {name:'Gelbe Karte Meckern',amount:10}
];
let storageOk=false;
let db={team:{name:'VFB Westhofen',code:code(),logo:null},users:[],series:[],events:[],rsvps:{},fines:[],beers:[],deposits:[],me:null,verified:false};
let tab='home',sheet=null,edit=null;
function code(){return Math.random().toString(36).slice(2,8).toUpperCase()}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function initStorage(){try{localStorage.setItem('__test','1');localStorage.removeItem('__test');storageOk=true}catch(e){storageOk=false}}
function save(){try{if(storageOk)localStorage.setItem(KEY,JSON.stringify(db))}catch(e){}}
function load(){try{let raw=null;if(storageOk){raw=localStorage.getItem(KEY)||localStorage.getItem('vfb_westhofen_app_v2')||localStorage.getItem('mannschafts_app_v2')}if(raw){db={...db,...JSON.parse(raw)};if(storageOk)localStorage.setItem(KEY,JSON.stringify(db))}}catch(e){}}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function initial(n){return (n||'?').trim().split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase()}
function localISO(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`}
function today(){return localISO(new Date())}
function fmt(d){return new Date(d+'T00:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'})}
function money(n){return Number(n||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'}
function me(){return db.users.find(u=>u.id===db.me)}
function role(u){if(!u)return 'player'; if(u.role)return u.role; if(u.admin)return 'admin'; if(u.cash)return 'cashier'; return 'player'}
function roleLabel(u){return ({admin:'Admin',trainer:'Trainer',cashier:'Spieler/Kassenwart',player:'Spieler'})[role(u)]||'Spieler'}
function roleClass(u){return ({admin:'adminBadge',trainer:'trainerBadge',cashier:'cashBadge',player:'playerBadge'})[role(u)]||'playerBadge'}
function avatarClass(u){return ({admin:'admin',trainer:'trainer',cashier:'cashier',player:''})[role(u)]||''}
function isAdmin(u=me()){return role(u)==='admin'}
function isTrainer(u=me()){return isAdmin(u)||role(u)==='trainer'}
function canCash(u=me()){return isAdmin(u)||role(u)==='trainer'||role(u)==='cashier'}
function canEvents(u=me()){return isAdmin(u)||role(u)==='trainer'}
function canRemovePlayers(u=me()){return isAdmin(u)||role(u)==='trainer'}
function ensure(){db.team=db.team||{name:'VFB Westhofen',code:code(),logo:null};db.users=db.users||[];db.series=db.series||[];db.events=db.events||[];db.rsvps=db.rsvps||{};db.fines=db.fines||[];db.beers=db.beers||[];db.deposits=db.deposits||[];db.users.forEach(u=>{if(!u.role)u.role=u.admin?'admin':(u.cash?'cashier':'player')});if(db.series.length===0){db.series=[{id:uid(),weekday:2,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]},{id:uid(),weekday:4,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]}]} }
function logoHtml(){return db.team.logo?`<div class="crest"><img src="${db.team.logo}" alt="Logo"></div>`:`<div class="crest">VFB</div>`}
function allEvents(){let out=[...db.events];db.series.forEach(s=>{for(let i=-14;i<=90;i++){let d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+i);if(d.getDay()==s.weekday){let iso=localISO(d);if(!s.skip?.includes(iso))out.push({id:'ser:'+s.id+':'+iso,type:'training',date:iso,time:s.time,end:s.end,place:s.place,note:s.note,seriesId:s.id})}}});return out.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time))}
function upcoming(){return allEvents().filter(e=>e.date>=today())}
function past(){return allEvents().filter(e=>e.date<today()).reverse()}
function groups(id){let r=db.rsvps[id]||{},yes=[],no=[];db.users.forEach(u=>{if(r[u.id]?.s==='yes')yes.push(u);else if(r[u.id]?.s==='no')no.push({u,reason:r[u.id].reason||''})});let answered=[...yes.map(u=>u.id),...no.map(x=>x.u.id)];return{yes,no,openUsers:db.users.filter(u=>!answered.includes(u.id))}}
function bal(){let fineOpen=db.fines.filter(f=>!f.paid).reduce((s,f)=>s+Number(f.amount||0),0);let finePaid=db.fines.filter(f=>f.paid).reduce((s,f)=>s+Number(f.amount||0),0);let fineDeposit=db.deposits.filter(d=>d.kind==='fine').reduce((s,d)=>s+Number(d.amount||0),0);let beerOpen=db.beers.filter(b=>!b.paid).length*BEER_PRICE;let beerPaid=db.beers.filter(b=>b.paid).length*BEER_PRICE;let beerDeposit=db.deposits.filter(d=>d.kind==='beer').reduce((s,d)=>s+Number(d.amount||0),0);return{fineOpen,fineCash:finePaid+fineDeposit,beerOpen,beerCash:beerPaid+beerDeposit}}
function userBal(id){let fineOpen=db.fines.filter(f=>f.user===id&&!f.paid).reduce((s,f)=>s+Number(f.amount||0),0);let finePaid=db.fines.filter(f=>f.user===id&&f.paid).reduce((s,f)=>s+Number(f.amount||0),0);let fineDep=db.deposits.filter(d=>d.user===id&&d.kind==='fine').reduce((s,d)=>s+Number(d.amount||0),0);let beerOpen=db.beers.filter(b=>b.user===id&&!b.paid).length*BEER_PRICE;let beerPaid=db.beers.filter(b=>b.user===id&&b.paid).length*BEER_PRICE;let beerDep=db.deposits.filter(d=>d.user===id&&d.kind==='beer').reduce((s,d)=>s+Number(d.amount||0),0);return{fineOpen,fineCash:finePaid+fineDep,beerOpen,beerCash:beerPaid+beerDep}}
function summaryHtml(){let b=bal();return `<div class="summary"><div class="card hi"><div class="muted small">Strafen offen</div><div class="money">${money(b.fineOpen)}</div><div class="muted small">Strafenkasse aktuell</div><div class="money">${money(b.fineCash)}</div></div><div class="card hi"><div class="muted small">Bier offen</div><div class="beer">${money(b.beerOpen)}</div><div class="muted small">Bierkasse aktuell</div><div class="beer">${money(b.beerCash)}</div></div></div>`}
function app(body){let u=me();return `<div class="app"><div class="head"><div class="brand" onclick="openSheet('team')">${logoHtml()}<div class="title">${esc(db.team.name)}</div></div>${u?`<button class="chip" onclick="openSheet('profile')">${esc(u.name.split(' ')[0])}</button>`:''}</div><div class="content">${body}</div>${fab()}${nav()}${sheet?renderSheet():''}</div>`}
function nav(){return `<div class="nav"><button class="${tab==='home'?'active':''}" onclick="setTab('home')">Start</button><button class="${tab==='termine'?'active':''}" onclick="setTab('termine')">Termine</button><button class="${tab==='strafen'?'active':''}" onclick="setTab('strafen')">Strafen</button><button class="${tab==='bier'?'active':''}" onclick="setTab('bier')">Bier</button><button class="${tab==='kader'?'active':''}" onclick="setTab('kader')">Kader</button></div>`}
function fab(){if(tab==='termine'&&canEvents())return `<button class="fab" onclick="openSheet('event')">+</button>`;if(tab==='strafen'&&canCash())return `<button class="fab" onclick="openSheet('fine')">+</button>`;if(tab==='kader'&&isAdmin())return `<button class="fab" onclick="openSheet('player')">+</button>`;return ''}
function setTab(t){tab=t;sheet=null;render()}function openSheet(s,e=null){sheet=s;edit=e;render()}function closeSheet(){sheet=null;edit=null;render()}
function render(){load();ensure();if(!db.users.length){document.getElementById('app').innerHTML=createView();return}if(!db.verified){document.getElementById('app').innerHTML=codeView();return}if(!db.me){document.getElementById('app').innerHTML=pickView();return}let body=tab==='home'?home():tab==='termine'?termine():tab==='strafen'?strafen():tab==='bier'?bier():kader();document.getElementById('app').innerHTML=app(body)}
function createView(){return `<div class="app"><div class="content" style="padding-top:70px"><div class="divider"><span class="dot"></span>Team gründen<span></span></div><div class="card hi"><div class="field"><label>Teamname</label><input id="team" value="VFB Westhofen"></div><div class="field"><label>Dein Name</label><input id="name"></div><div class="field"><label>PIN</label><input id="pin" type="password" inputmode="numeric"></div><button class="btn btn-primary btn-block" onclick="createTeam()">Team gründen & als Admin anmelden</button></div></div></div>`}
function codeView(){return `<div class="app"><div class="content" style="padding-top:70px"><div class="divider"><span class="dot"></span>Einladungscode<span></span></div><div class="card hi"><div class="field"><label>Code</label><input id="codeInput" style="text-transform:uppercase" placeholder="${esc(db.team.code)}"></div><button class="btn btn-primary btn-block" onclick="verifyCode()">Weiter</button></div></div></div>`}
function pickView(){return `<div class="app"><div class="head"><div class="brand">${logoHtml()}<div class="title">${esc(db.team.name)}</div></div></div><div class="content"><div class="divider"><span class="dot"></span>Spieler anmelden<span></span></div><div class="card">${db.users.map(u=>`<div class="player"><div class="avatar ${avatarClass(u)}">${u.no||initial(u.name)}</div><div class="grow"><div class="name">${esc(u.name)}</div><span class="badge ${roleClass(u)}">${roleLabel(u)}</span></div><button class="btn btn-primary" onclick="openSheet('login','${u.id}')">Anmelden</button></div>`).join('')}</div><div class="divider"><span class="dot"></span>Neu im Team<span></span></div><div class="card"><div class="field"><label>Name</label><input id="newName"></div><div class="field"><label>PIN festlegen</label><input id="newPin" type="password" inputmode="numeric"></div><button class="btn btn-primary btn-block" onclick="joinTeam()">Als Spieler beitreten</button></div><button class="btn btn-ghost btn-block" onclick="db.verified=false;save();render()">Anderen Code eingeben</button></div>${sheet?renderSheet():''}</div>`}
function createTeam(){let n=name.value.trim(),t=team.value.trim()||'VFB Westhofen',p=pin.value.trim();if(!n||!p)return alert('Bitte Name und PIN angeben.');let id=uid();db.team={name:t,code:code(),logo:null};db.users=[{id,name:n,pin:p,no:null,role:'admin'}];db.me=id;db.verified=true;db.series=[{id:uid(),weekday:2,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]},{id:uid(),weekday:4,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]}];save();render()}
function verifyCode(){if(codeInput.value.trim().toUpperCase()===db.team.code){db.verified=true;save();render()}else alert('Code ist nicht korrekt.')}
function joinTeam(){let n=newName.value.trim(),p=newPin.value.trim();if(!n||!p)return alert('Bitte Name und PIN angeben.');let id=uid();db.users.push({id,name:n,pin:p,no:null,role:'player'});db.me=id;save();render()}
function doLogin(){let u=db.users.find(x=>x.id===edit);if(!u)return;if(String(u.pin)!==String(loginPin.value))return alert('PIN falsch.');db.me=u.id;save();closeSheet();render()}
function eventCard(e,pastFlag=false){let g=groups(e.id),r=(db.rsvps[e.id]||{})[db.me]||{},title=e.type==='spiel'?`vs. ${esc(e.opp||'?')}`:esc(e.note||'Training');return `<div class="card ${!pastFlag?'hi':''}"><div class="row"><span class="badge ${e.type}">${e.type==='spiel'?'Spiel':'Training'}</span><span class="muted small">${fmt(e.date)}${e.time?`, ${e.time}${e.end?'-'+e.end:''} Uhr`:''}</span></div><h3 style="margin:10px 0 2px">${title}</h3><div class="muted">${esc(e.place||'')}</div>${!pastFlag?`<div class="btnrow"><button class="btn ${r.s==='yes'?'btn-primary':'btn-ghost'}" onclick="rsvp('${e.id}','yes')">Zusagen</button><button class="btn ${r.s==='no'?'btn-red':'btn-ghost'}" onclick="openSheet('reason','${e.id}')">Absagen</button></div>${r.s?`<button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="clearRsvp('${e.id}')">Antwort zurückziehen</button>`:''}`:''}<button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="openSheet('eventDetails','${e.id}')">Übersicht anzeigen</button><div class="muted small" style="margin-top:10px;border-top:1px solid var(--line);padding-top:8px"><span class="ok"><b>Kommt (${g.yes.length}):</b> ${g.yes.map(x=>esc(x.name.split(' ')[0])).join(', ')||'-'}</span><br><span class="danger"><b>Abgesagt (${g.no.length}):</b> ${g.no.map(x=>esc(x.u.name.split(' ')[0])+(x.reason?' ('+esc(x.reason)+')':'')).join(', ')||'-'}</span><br><b>Offen:</b> ${g.openUsers.length}</div>${canEvents()?`<div class="btnrow"><button class="btn btn-ghost" onclick="editEvent('${e.id}')">Bearbeiten</button><button class="btn btn-red" onclick="delEvent('${e.id}')">Löschen</button></div>`:''}</div>`}
function home(){let u=me(),e=upcoming()[0],ub=userBal(u.id);return `<div class="divider"><span class="dot"></span>Nächster Termin<span></span></div>${e?eventCard(e):'<div class="empty">Keine Termine vorhanden.</div>'}<div class="divider"><span class="dot"></span>Kassenstand<span></span></div>${summaryHtml()}<div class="divider"><span class="dot"></span>Dein Konto<span></span></div><div class="card"><div class="row"><span>Strafen offen</span><span class="money">${money(ub.fineOpen)}</span></div><div class="row" style="margin-top:8px"><span>Strafen bezahlt/eingezahlt</span><span class="money">${money(ub.fineCash)}</span></div><div class="row" style="margin-top:8px"><span>Bier offen</span><span class="beer">${money(ub.beerOpen)}</span></div><div class="row" style="margin-top:8px"><span>Bier bezahlt/eingezahlt</span><span class="beer">${money(ub.beerCash)}</span></div><button class="btn btn-amber btn-block" style="margin-top:12px" onclick="addBeer('${u.id}')">+ Bier eintragen</button></div>`}
function termine(){let up=upcoming(),pa=past().slice(0,10);return `<div class="divider"><span class="dot"></span>Anstehend<span></span></div>${up.length?up.map(e=>eventCard(e)).join(''):'<div class="empty">Keine Termine.</div>'}${pa.length?`<div class="divider"><span class="dot"></span>Vergangen<span></span></div>${pa.map(e=>eventCard(e,true)).join('')}`:''}${canEvents()?`<div class="divider"><span class="dot"></span>Serientraining<span></span></div><div class="card">${db.series.map(s=>`<div class="player"><div class="grow"><div class="name">${['So','Mo','Di','Mi','Do','Fr','Sa'][s.weekday]} ${s.time}-${s.end}</div><div class="muted small">${esc(s.note||'Training')} · ${esc(s.place||'')}</div></div><button class="btn btn-ghost" onclick="openSheet('series','${s.id}')">Ändern</button><button class="btn btn-red" onclick="delSeries('${s.id}')">X</button></div>`).join('')}<button class="btn btn-primary btn-block" onclick="openSheet('series')">+ Serie</button></div>`:''}`}
function strafen(){if(!canCash()){let u=me(),ub=userBal(u.id),mine=db.fines.filter(f=>f.user===u.id).sort((a,b)=>b.date.localeCompare(a.date));return `<div class="divider"><span class="dot"></span>Deine Strafen<span></span></div><div class="card hi"><div class="row"><span>Offen</span><span class="money">${money(ub.fineOpen)}</span></div><div class="row" style="margin-top:8px"><span>Bezahlt/eingezahlt</span><span class="money">${money(ub.fineCash)}</span></div></div>${mine.map(fineLine).join('')||'<div class="empty">Keine Strafen.</div>'}`}let totals=db.users.map(u=>({u,...userBal(u.id)})).sort((a,b)=>b.fineOpen-a.fineOpen);return `<div class="divider"><span class="dot"></span>Strafenkasse<span></span></div>${summaryHtml()}<button class="btn btn-blue btn-block" onclick="openSheet('deposit','fine')">+ Guthaben Strafenkasse einzahlen</button><div class="divider"><span class="dot"></span>Je Spieler<span></span></div>${totals.map(t=>`<div class="card"><div class="row"><div><div class="name">${esc(t.u.name)}</div><div class="muted small">Kasse: ${money(t.fineCash)}</div></div><span class="money">${money(t.fineOpen)}</span></div></div>`).join('')}<div class="divider"><span class="dot"></span>Einträge<span></span></div>${db.fines.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(f=>fineLine(f,true)).join('')||'<div class="empty">Keine Einträge.</div>'}`}
function fineLine(f,admin=canCash()){let u=db.users.find(x=>x.id===f.user);return `<div class="card"><div class="row"><div><div class="name">${esc(u?.name||'?')}</div><div class="muted small">${esc(f.reason)} · ${fmt(f.date)}</div></div><div style="text-align:right"><div class="money">${money(f.amount)}</div><span class="pill ${f.paid?'paid':'open'}">${f.paid?'bezahlt':'offen'}</span></div></div>${admin?`<div class="btnrow"><button class="btn btn-ghost" onclick="toggleFine('${f.id}')">${f.paid?'Offen':'Bezahlt'}</button><button class="btn btn-ghost" onclick="openSheet('fine','${f.id}')">Bearbeiten</button><button class="btn btn-red" onclick="delFine('${f.id}')">Löschen</button></div>`:''}</div>`}
function bier(){let u=me(),ub=userBal(u.id),totals=db.users.map(x=>({u:x,...userBal(x.id)})).sort((a,b)=>b.beerOpen-a.beerOpen);return `<div class="divider"><span class="dot"></span>Bierkasse<span></span></div>${summaryHtml()}${canCash()?`<button class="btn btn-blue btn-block" onclick="openSheet('deposit','beer')">+ Guthaben Bierkasse einzahlen</button>`:''}<div class="divider"><span class="dot"></span>Dein Bierkonto<span></span></div><div class="card hi"><div class="row"><span>Offen</span><span class="beer">${money(ub.beerOpen)}</span></div><div class="row" style="margin-top:8px"><span>Kasse bezahlt/eingezahlt</span><span class="beer">${money(ub.beerCash)}</span></div><button class="btn btn-amber btn-block" style="margin-top:12px" onclick="addBeer('${u.id}')">+ Bier</button></div><div class="divider"><span class="dot"></span>Je Spieler<span></span></div>${totals.map(t=>`<div class="card"><div class="row"><div><div class="name">${esc(t.u.name)}${t.u.id===db.me?' (du)':''}</div><div class="muted small">Kasse: ${money(t.beerCash)}</div></div><span class="beer">${money(t.beerOpen)}</span></div>${canCash()&&t.beerOpen?`<div class="btnrow"><button class="btn btn-ghost" onclick="removeLastBeer('${t.u.id}')">Letzten Strich entfernen</button><button class="btn btn-ghost" onclick="settleBeer('${t.u.id}')">Bezahlt / Striche entfernen</button></div>`:''}</div>`).join('')}`}
function kader(){return `<div class="divider"><span class="dot"></span>${db.users.length} im Kader<span></span></div><div class="card">${db.users.map(u=>`<div class="player"><div class="avatar ${avatarClass(u)}">${u.no||initial(u.name)}</div><div class="grow"><div class="name">${esc(u.name)}${u.id===db.me?' (du)':''}</div><span class="badge ${roleClass(u)}">${roleLabel(u)}</span></div><button class="btn btn-primary" onclick="openSheet('login','${u.id}')">Anmelden</button>${(isAdmin()||canRemovePlayers())?`<button class="btn btn-ghost" onclick="openSheet('editUser','${u.id}')">Ändern</button>`:''}</div>`).join('')}</div>`}
function renderSheet(){
 if(sheet==='login'){let u=db.users.find(x=>x.id===edit);return sh('Anmelden',`<div class="field"><label>Spieler</label><input value="${esc(u?.name||'')}" readonly></div><div class="field"><label>PIN</label><input id="loginPin" type="password" inputmode="numeric" autofocus></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="doLogin()">Anmelden</button></div>`)}
 if(sheet==='profile'){let u=me();return sh('Dein Profil',`<div class="field"><label>Name</label><input id="pfName" value="${esc(u.name)}"></div><div class="field"><label>Trikotnummer</label><input id="pfNo" value="${esc(u.no||'')}"></div><div class="field"><label>Neue PIN optional</label><input id="pfPin" type="password" inputmode="numeric"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="saveProfile()">Speichern</button></div><div class="btnrow"><button class="btn btn-ghost" onclick="db.me=null;save();render()">Benutzer wechseln</button><button class="btn btn-red" onclick="db.me=null;db.verified=false;save();render()">Abmelden</button></div>`)}
 if(sheet==='team'){let link=location.origin+location.pathname+'?invite='+db.team.code;return sh('Team',`${isAdmin()?`<div class="field"><label>Logo</label>${db.team.logo?`<img class="logoPreview" src="${db.team.logo}">`:''}<input type="file" accept="image/*" onchange="saveLogo(this.files[0])"></div><div class="field"><label>Teamname</label><input id="tmName" value="${esc(db.team.name)}"></div><div class="field"><label>Einladungscode</label><input value="${esc(db.team.code)}" readonly onclick="this.select()"></div><div class="field"><label>Einladungslink</label><input value="${esc(link)}" readonly onclick="this.select()"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Schließen</button><button class="btn btn-primary" onclick="saveTeam()">Speichern</button></div><button class="btn btn-ghost btn-block" onclick="setDefaultTrainingDays()">Training auf Di & Do setzen</button><button class="btn btn-gold btn-block" style="margin-top:8px" onclick="exportData()">Backup exportieren</button><label class="btn btn-ghost btn-block" style="margin-top:8px;text-align:center">Backup importieren<input class="hidden" type="file" accept="application/json" onchange="importData(this.files[0])"></label><button class="btn btn-red btn-block" style="margin-top:8px" onclick="resetCash()">Kassen auf null setzen</button>`:`<p>${esc(db.team.name)}</p>${db.team.logo?`<img class="logoPreview" src="${db.team.logo}">`:''}<button class="btn btn-ghost btn-block" onclick="closeSheet()">Schließen</button>`}`)}
 if(sheet==='event'){let e=db.events.find(x=>x.id===edit)||{type:'training',date:today(),time:'19:00',end:'20:30'};return sh(edit?'Termin bearbeiten':'Termin anlegen',`<div class="field"><label>Art</label><select id="evType"><option value="training" ${e.type==='training'?'selected':''}>Training</option><option value="spiel" ${e.type==='spiel'?'selected':''}>Spiel</option></select></div><div class="field"><label>Datum</label><input id="evDate" type="date" value="${e.date||today()}"></div><div class="btnrow"><div class="field"><label>Start</label><input id="evTime" type="time" value="${e.time||''}"></div><div class="field"><label>Ende</label><input id="evEnd" type="time" value="${e.end||''}"></div></div><div class="field"><label>Ort</label><input id="evPlace" value="${esc(e.place||'')}"></div><div class="field"><label>Gegner bei Spiel</label><input id="evOpp" value="${esc(e.opp||'')}"></div><div class="field"><label>Notiz</label><input id="evNote" value="${esc(e.note||'')}"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="saveEvent()">Speichern</button></div>`)}
 if(sheet==='series'){let s=db.series.find(x=>x.id===edit)||{weekday:2,time:'19:00',end:'20:30',place:'',note:'Training'};return sh(edit?'Serie bearbeiten':'Serie anlegen',`<div class="field"><label>Wochentag</label><select id="seWd">${['So','Mo','Di','Mi','Do','Fr','Sa'].map((w,i)=>`<option value="${i}" ${s.weekday==i?'selected':''}>${w}</option>`).join('')}</select></div><div class="btnrow"><div class="field"><label>Start</label><input id="seTime" type="time" value="${s.time}"></div><div class="field"><label>Ende</label><input id="seEnd" type="time" value="${s.end}"></div></div><div class="field"><label>Ort</label><input id="sePlace" value="${esc(s.place||'')}"></div><div class="field"><label>Notiz</label><input id="seNote" value="${esc(s.note||'')}"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="saveSeries()">Speichern</button></div>`)}
 if(sheet==='eventDetails'){let e=allEvents().find(x=>x.id===edit);if(!e)return sh('Übersicht','Termin nicht gefunden.');let g=groups(edit),title=e.type==='spiel'?`Spiel vs. ${esc(e.opp||'?')}`:esc(e.note||'Training');return sh('Terminübersicht',`<div class="card hi"><div class="name">${title}</div><div class="muted small">${fmt(e.date)}${e.time?`, ${e.time}${e.end?'-'+e.end:''} Uhr`:''}</div><div class="muted small">${esc(e.place||'')}</div></div><div class="listbox"><b class="ok">Kommt (${g.yes.length})</b><br>${g.yes.map(u=>esc(u.name)).join('<br>')||'-'}</div><div class="listbox"><b class="danger">Abgesagt (${g.no.length})</b><br>${g.no.map(x=>esc(x.u.name)+(x.reason?` – ${esc(x.reason)}`:'')).join('<br>')||'-'}</div><div class="listbox"><b>Offen (${g.openUsers.length})</b><br>${g.openUsers.map(u=>esc(u.name)).join('<br>')||'-'}</div><button class="btn btn-ghost btn-block" style="margin-top:12px" onclick="closeSheet()">Schließen</button>`)}
 if(sheet==='reason')return sh('Absagen',`<div class="field"><label>Grund</label><input id="reason"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-red" onclick="saveNo()">Absage speichern</button></div>`)
 if(sheet==='fine'){let f=db.fines.find(x=>x.id===edit)||{user:db.users[0]?.id,reason:'',amount:''};return sh(edit?'Strafe bearbeiten':'Strafe vergeben',`<div class="field"><label>Spieler</label><select id="fiUser">${db.users.map(u=>`<option value="${u.id}" ${f.user===u.id?'selected':''}>${esc(u.name)}</option>`).join('')}</select></div><div class="field"><label>Strafe auswählen</label><select id="fiPreset" onchange="presetFine()"><option value="">Eigene Strafe</option>${PRESETS.map((p,i)=>`<option value="${i}">${p.name} - ${p.perMinute?'1 € pro Minute':money(p.amount)}</option>`).join('')}</select></div><div class="field hidden" id="minuteWrap"><label>Minuten</label><input id="fiMinutes" type="number" min="1" step="1" value="1" oninput="presetFine()"></div><div class="field"><label>Grund</label><input id="fiReason" value="${esc(f.reason)}"></div><div class="field"><label>Betrag EUR</label><input id="fiAmount" type="number" step="0.5" value="${esc(f.amount)}"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-gold" onclick="saveFine()">Speichern</button></div>`)}
 if(sheet==='deposit'){let kind=edit||'fine';return sh(kind==='beer'?'Guthaben Bierkasse':'Guthaben Strafenkasse',`<div class="field"><label>Spieler</label><select id="depUser">${db.users.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('')}</select></div><div class="field"><label>Betrag EUR</label><input id="depAmount" type="number" step="0.5" min="0"></div><div class="field"><label>Notiz optional</label><input id="depNote" placeholder="z.B. Einzahlung bar"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-blue" onclick="saveDeposit('${kind}')">Einzahlen</button></div>`)}
 if(sheet==='player')return sh('Spieler hinzufügen',`<div class="field"><label>Name</label><input id="plName"></div><div class="field"><label>PIN</label><input id="plPin" type="password" inputmode="numeric"></div><div class="field"><label>Trikotnummer</label><input id="plNo"></div><div class="field"><label>Einteilung</label><select id="plRole"><option value="player">Spieler</option><option value="cashier">Spieler/Kassenwart</option><option value="trainer">Trainer</option><option value="admin">Admin</option></select></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="savePlayer()">Hinzufügen</button></div>`)
 if(sheet==='editUser'){let u=db.users.find(x=>x.id===edit);return sh('Spieler bearbeiten',`<div class="field"><label>Name</label><input id="euName" value="${esc(u.name)}"></div><div class="field"><label>Trikotnummer</label><input id="euNo" value="${esc(u.no||'')}"></div><div class="field"><label>Neue PIN optional</label><input id="euPin" type="password" inputmode="numeric"></div><div class="field"><label>Einteilung</label><select id="euRole" ${!isAdmin()?'disabled':''}><option value="player" ${role(u)==='player'?'selected':''}>Spieler</option><option value="cashier" ${role(u)==='cashier'?'selected':''}>Spieler/Kassenwart</option><option value="trainer" ${role(u)==='trainer'?'selected':''}>Trainer</option><option value="admin" ${role(u)==='admin'?'selected':''}>Admin</option></select></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="saveEditUser()">Speichern</button></div>${canRemovePlayers()&&u.id!==db.me?`<button class="btn btn-red btn-block" onclick="delUser('${u.id}')">Spieler entfernen</button>`:''}`)}
 return ''
}
function sh(t,b){return `<div class="sheetBg" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()"><h3>${t}</h3>${b}</div></div>`}
function rsvp(id,s){db.rsvps[id]=db.rsvps[id]||{};db.rsvps[id][db.me]={s};save();render()}function clearRsvp(id){if(db.rsvps[id])delete db.rsvps[id][db.me];save();render()}function saveNo(){let v=reason.value.trim();if(!v)return alert('Bitte Grund angeben.');db.rsvps[edit]=db.rsvps[edit]||{};db.rsvps[edit][db.me]={s:'no',reason:v};save();closeSheet();render()}
function saveEvent(){if(!canEvents())return;let o={id:edit||uid(),type:evType.value,date:evDate.value,time:evTime.value,end:evEnd.value,place:evPlace.value.trim(),opp:evOpp.value.trim(),note:evNote.value.trim()};if(!o.date)return alert('Datum fehlt.');if(edit){let i=db.events.findIndex(x=>x.id===edit);db.events[i]=o}else db.events.push(o);save();closeSheet();render()}function editEvent(id){if(id.startsWith('ser:'))return alert('Serientermine unten bearbeiten.');openSheet('event',id)}function delEvent(id){if(!canEvents())return;if(id.startsWith('ser:')){let[_,sid,d]=id.split(':');let s=db.series.find(x=>x.id===sid);if(s){s.skip=s.skip||[];s.skip.push(d)}}else db.events=db.events.filter(x=>x.id!==id);save();render()}
function saveSeries(){if(!canEvents())return;let o={id:edit||uid(),weekday:Number(seWd.value),time:seTime.value,end:seEnd.value,place:sePlace.value.trim(),note:seNote.value.trim(),skip:[]};if(edit){let old=db.series.find(x=>x.id===edit);o.skip=old?.skip||[];db.series[db.series.findIndex(x=>x.id===edit)]=o}else db.series.push(o);save();closeSheet();render()}function delSeries(id){if(canEvents()&&confirm('Serie löschen?')){db.series=db.series.filter(x=>x.id!==id);save();render()}}
function presetFine(){let i=fiPreset.value;if(i==='')return;let p=PRESETS[Number(i)];if(p.perMinute){minuteWrap.classList.remove('hidden');let min=Number(fiMinutes.value||1);fiReason.value=p.name+' ('+min+' Min.)';fiAmount.value=(min*p.amount).toFixed(2)}else{minuteWrap.classList.add('hidden');fiReason.value=p.name;fiAmount.value=p.amount}}
function saveFine(){if(!canCash())return;let amount=Number(fiAmount.value);if(!fiReason.value.trim()||!amount)return alert('Grund und Betrag fehlen.');let o={id:edit||uid(),user:fiUser.value,reason:fiReason.value.trim(),amount,date:today(),paid:false};if(edit){let f=db.fines.find(x=>x.id===edit);Object.assign(f,o,{date:f.date,paid:f.paid})}else db.fines.push(o);save();closeSheet();render()}function toggleFine(id){if(!canCash())return;let f=db.fines.find(x=>x.id===id);if(f)f.paid=!f.paid;save();render()}function delFine(id){if(!canCash())return;db.fines=db.fines.filter(x=>x.id!==id);save();render()}
function addBeer(id){db.beers.push({id:uid(),user:id,date:today(),paid:false});save();render()}function removeLastBeer(id){if(!canCash())return;let b=db.beers.filter(x=>x.user===id&&!x.paid).pop();if(b)db.beers=db.beers.filter(x=>x.id!==b.id);save();render()}function settleBeer(id){if(!canCash())return;let open=db.beers.filter(b=>b.user===id&&!b.paid);if(!open.length)return;let u=db.users.find(x=>x.id===id);if(!confirm(`${u?.name||'Spieler'} hat ${open.length} Strich(e) bezahlt? Die offenen Striche werden entfernt.`))return;db.deposits.push({id:uid(),kind:'beer',user:id,amount:open.length*BEER_PRICE,date:today(),note:'Bier bezahlt: '+open.length+' Strich(e)'});db.beers=db.beers.filter(b=>!(b.user===id&&!b.paid));save();render()}
function saveDeposit(kind){if(!canCash())return;let amount=Number(depAmount.value);if(!amount)return alert('Bitte Betrag angeben.');db.deposits.push({id:uid(),kind,user:depUser.value,amount,date:today(),note:depNote.value.trim()});save();closeSheet();render()}
function savePlayer(){if(!isAdmin())return;let n=plName.value.trim(),p=plPin.value.trim();if(!n||!p)return alert('Name und PIN fehlen.');db.users.push({id:uid(),name:n,pin:p,no:plNo.value.trim()||null,role:plRole.value});save();closeSheet();render()}function saveEditUser(){let u=db.users.find(x=>x.id===edit);if(!u)return;u.name=euName.value.trim();u.no=euNo.value.trim()||null;if(euPin.value.trim())u.pin=euPin.value.trim();if(isAdmin())u.role=euRole.value;save();closeSheet();render()}function delUser(id){if(!canRemovePlayers()||id===db.me)return;if(confirm('Spieler wirklich entfernen?')){db.users=db.users.filter(u=>u.id!==id);save();render()}}
function saveProfile(){let u=me();u.name=pfName.value.trim();u.no=pfNo.value.trim()||null;if(pfPin.value.trim())u.pin=pfPin.value.trim();save();closeSheet();render()}function saveTeam(){if(!isAdmin())return;db.team.name=tmName.value.trim()||db.team.name;save();closeSheet();render()}function saveLogo(file){if(!isAdmin()||!file)return;let r=new FileReader();r.onload=()=>{db.team.logo=r.result;save();render()};r.readAsDataURL(file)}function setDefaultTrainingDays(){if(!isAdmin())return;if(!confirm('Training auf Dienstag und Donnerstag zurücksetzen?'))return;db.series=[{id:uid(),weekday:2,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]},{id:uid(),weekday:4,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]}];save();render()}
function resetCash(){if(!isAdmin())return;if(!confirm('Kassen wirklich auf null setzen? Strafen, Bierstriche und Einzahlungen werden gelöscht.'))return;db.fines=[];db.beers=[];db.deposits=[];save();render()}function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='vfb-westhofen-backup.json';a.click()}function importData(file){if(!file)return;let r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);save();render()}catch(e){alert('Backup konnte nicht gelesen werden.')}};r.readAsText(file)}
initStorage();load();ensure();render();
</script>
</body>
