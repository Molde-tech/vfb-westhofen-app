<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VFB Westhofen Mannschafts-App</title>
<style>
:root{--bg:#0D2016;--bg2:#132B1D;--card:#183523;--hi:#1F4028;--line:rgba(241,250,238,.14);--text:#F1FAEE;--dim:#9BB6A4;--green:#4CAF7D;--gold:#E3B23C;--red:#E2585A;--amber:#D98A3D}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}button,input,select,textarea{font:inherit}.app{max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:82px}.head{position:sticky;top:0;z-index:2;background:var(--bg2);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:10px;min-width:0}.crest{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;border:2px dashed var(--green);background:#21472f;color:var(--green);font-weight:800}.title{font-weight:800;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chip{border:1px solid var(--line);background:var(--card);border-radius:99px;padding:8px 10px;color:var(--text);font-size:13px}.content{padding:16px}.divider{display:flex;align-items:center;gap:10px;color:var(--dim);margin:18px 0 12px;text-transform:uppercase;font-size:11px;font-weight:800;letter-spacing:.12em}.divider:before,.divider:after{content:'';height:1px;border-top:1px dashed var(--line);flex:1}.dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}.card.hi{background:var(--hi)}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.muted{color:var(--dim);font-size:13px}.small{font-size:12px}.name{font-weight:750}.empty{text-align:center;color:var(--dim);padding:28px 12px}.badge{font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;border-radius:8px;padding:4px 8px}.training{background:rgba(76,175,125,.16);color:var(--green)}.spiel{background:rgba(227,178,60,.16);color:var(--gold)}.btn{border:0;border-radius:12px;padding:11px 12px;font-weight:750;cursor:pointer}.btn-primary{background:var(--green);color:#08180f}.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line)}.btn-red{background:var(--red);color:white}.btn-gold{background:var(--gold);color:#281a02}.btn-amber{background:var(--amber);color:#271203}.btn-block{width:100%}.btnrow{display:flex;gap:8px;margin-top:12px}.btnrow>*{flex:1}.nav{position:fixed;left:0;right:0;bottom:0;max-width:500px;margin:0 auto;background:var(--bg2);border-top:1px solid var(--line);display:flex;padding:8px 3px calc(8px + env(safe-area-inset-bottom))}.nav button{flex:1;background:transparent;border:0;color:var(--dim);padding:8px 2px;border-radius:12px;font-size:11px;font-weight:900;text-transform:uppercase}.nav button.active{color:var(--green);background:rgba(76,175,125,.10)}.fab{position:fixed;right:calc(50% - 250px + 18px);bottom:92px;width:54px;height:54px;border-radius:50%;border:0;background:var(--green);color:#07160e;font-size:30px;font-weight:800;box-shadow:0 10px 25px rgba(0,0,0,.35)}@media(max-width:540px){.fab{right:18px}}.sheetBg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:5}.sheet{width:100%;max-width:500px;max-height:86vh;overflow:auto;background:var(--bg2);border-radius:20px 20px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom))}.sheet h3{margin:0 0 14px;text-transform:uppercase;letter-spacing:.05em}.field{margin-bottom:12px}.field label{display:block;color:var(--dim);font-size:11px;margin-bottom:5px;text-transform:uppercase;font-weight:900;letter-spacing:.08em}input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;color:var(--text);padding:12px}input:focus,select:focus,textarea:focus{outline:2px solid rgba(76,175,125,.35);border-color:var(--green)}.avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;border:1.5px dashed var(--green);color:var(--green);background:var(--hi);font-weight:900;flex:0 0 auto}.avatar.admin{border-color:var(--gold);color:var(--gold)}.player{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}.player:last-child{border-bottom:0}.grow{flex:1}.pill{display:inline-block;border-radius:99px;padding:3px 8px;font-size:11px;font-weight:800}.paid{background:rgba(76,175,125,.15);color:var(--green)}.open{background:rgba(226,88,90,.15);color:var(--red)}.danger{color:var(--red)}.ok{color:var(--green)}.money{font-weight:900;color:var(--gold)}.beer{font-weight:900;color:var(--amber)}.topActions{display:flex;gap:8px;flex-wrap:wrap}.topActions .btn{padding:9px 10px;font-size:13px}.hidden{display:none!important}
</style>
</head>
<body><div id="app"></div>
<script>
const KEY='mannschafts_app_v2';
let storageOk=false;
let memoryStore=null;
let db={team:{name:'Meine Mannschaft',code:code()},users:[],events:[],series:[],rsvps:{},fines:[],beers:[],me:null,verified:false};
let tab='home',sheet=null,edit=null,tmp={};
function code(){return Math.random().toString(36).slice(2,8).toUpperCase()}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function initStorage(){try{const t='__teamapp_test__';window.localStorage.setItem(t,'1');window.localStorage.removeItem(t);storageOk=true;}catch(e){storageOk=false;}}
function save(){try{const val=JSON.stringify(db); if(storageOk){window.localStorage.setItem(KEY,val)} else {memoryStore=val}}catch(e){try{memoryStore=JSON.stringify(db)}catch(_){}}}
function load(){try{let raw=null; if(storageOk){raw=window.localStorage.getItem(KEY)} else {raw=memoryStore} const x=raw?JSON.parse(raw):null; if(x) db={...db,...x}}catch(e){}}
function resetLocalLogin(){db.me=null;db.verified=false;save();render()}
function initials(n){return (n||'?').trim().split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase()}
function me(){return db.users.find(x=>x.id===db.me)}
function isAdmin(u=me()){return !!(u&&u.admin)}
function canCash(u=me()){return !!(u&&(u.admin||u.cash))}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function today(){const d=new Date();return d.toISOString().slice(0,10)}
function fmt(d){return new Date(d+'T00:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'})}
function money(n){return Number(n||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' EUR'}
function dateAdd(days){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}
function allEvents(){let out=[...db.events]; db.series.forEach(s=>{for(let i=-14;i<=90;i++){let d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+i);if(d.getDay()==s.weekday){let iso=d.toISOString().slice(0,10); if(!s.skip?.includes(iso)) out.push({id:'ser:'+s.id+':'+iso,type:'training',date:iso,time:s.time,end:s.end,place:s.place,note:s.note,seriesId:s.id})}}}); return out.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time))}
function upcoming(){return allEvents().filter(e=>e.date>=today())}
function past(){return allEvents().filter(e=>e.date<today()).reverse()}
function groups(eid){let r=db.rsvps[eid]||{},yes=[],no=[];db.users.forEach(u=>{if(r[u.id]?.s==='yes')yes.push(u); if(r[u.id]?.s==='no')no.push({u,reason:r[u.id].reason||''})});return{yes,no,open:Math.max(0,db.users.length-yes.length-no.length)}}
function layout(body){let u=me();return `<div class="app"><div class="head"><div class="brand" onclick="openSheet('team')"><div class="crest">⚽</div><div class="title">${esc(db.team.name)}</div></div>${u?`<button class="chip" onclick="openSheet('profile')">${esc(u.name.split(' ')[0])}</button>`:''}</div><div class="content">${body}</div>${fab()}${nav()}${sheet?renderSheet():''}</div>`}
function nav(){return `<div class="nav"><button class="${tab==='home'?'active':''}" onclick="setTab('home')">Start</button><button class="${tab==='termine'?'active':''}" onclick="setTab('termine')">Termine</button><button class="${tab==='strafen'?'active':''}" onclick="setTab('strafen')">Strafen</button><button class="${tab==='bier'?'active':''}" onclick="setTab('bier')">Bier</button><button class="${tab==='kader'?'active':''}" onclick="setTab('kader')">Kader</button></div>`}
function fab(){if(tab==='termine'&&isAdmin())return `<button class="fab" onclick="openSheet('event')">+</button>`; if(tab==='strafen'&&canCash())return `<button class="fab" onclick="openSheet('fine')">+</button>`; if(tab==='kader'&&isAdmin())return `<button class="fab" onclick="openSheet('player')">+</button>`; return ''}
function setTab(t){tab=t;sheet=null;render()}
function openSheet(s,e=null){sheet=s;edit=e;tmp={};render()}
function closeSheet(){sheet=null;edit=null;tmp={};render()}
function render(){load(); if(!db.users.length){document.getElementById('app').innerHTML=renderCreate();return} if(!db.verified){document.getElementById('app').innerHTML=renderLogin();return} if(!db.me){document.getElementById('app').innerHTML=renderPickUser();return} let body=tab==='home'?home():tab==='termine'?termine():tab==='strafen'?strafen():tab==='bier'?bier():kader(); document.getElementById('app').innerHTML=layout(body)}
function renderCreate(){return `<div class="app"><div class="content" style="padding-top:70px"><div class="divider"><span class="dot"></span>Team gründen<span></span></div><div class="card hi"><div class="field"><label>Vereins- / Teamname</label><input id="team"></div><div class="field"><label>Dein Name</label><input id="name"></div><div class="field"><label>PIN für deinen Login</label><input id="pin" type="password" inputmode="numeric" placeholder="z.B. 1234"></div><button class="btn btn-primary btn-block" onclick="createTeam()">Team gründen & anmelden</button><p class="muted small" id="storageHint">Hinweis: Auf GitHub Pages werden deine Daten im Browser gespeichert. In Vorschau-/Sandbox-Fenstern kann die Speicherung blockiert sein.</p></div></div></div>`}
function renderLogin(){const p=new URLSearchParams(location.search);let inv=p.get('invite'); if(inv&&inv.toUpperCase()===db.team.code){db.verified=true;save();setTimeout(render);return '<div></div>'}return `<div class="app"><div class="content" style="padding-top:70px"><div class="divider"><span class="dot"></span>Anmelden<span></span></div><div class="card hi"><div class="field"><label>Einladungscode</label><input id="code" style="text-transform:uppercase" placeholder="${esc(db.team.code)}"></div><button class="btn btn-primary btn-block" onclick="verifyCode()">Weiter</button><p class="muted small">Du hast schon ein Team erstellt? Dann brauchst du nur den Einladungscode. Danach kannst du deinen Spieler auswählen und dich mit PIN anmelden.</p></div></div></div>`}
function renderPickUser(){return `<div class="app"><div class="head"><div class="brand"><div class="crest">⚽</div><div class="title">${esc(db.team.name)}</div></div></div><div class="content"><div class="divider"><span class="dot"></span>Spieler anmelden<span></span></div><div class="card">${db.users.map(u=>`<div class="player"><div class="avatar ${u.admin?'admin':''}">${u.no||initials(u.name)}</div><div class="grow"><div class="name">${esc(u.name)}</div><div class="muted small">${u.admin?'Admin':'Spieler'}${u.cash&&!u.admin?' · Kassenwart':''}</div></div><button class="btn btn-primary" onclick="openLoginPin('${u.id}')">Anmelden</button></div>`).join('')}</div><div class="divider"><span class="dot"></span>Neu im Team<span></span></div><div class="card"><div class="field"><label>Name</label><input id="newName"></div><div class="field"><label>PIN festlegen</label><input id="newPin" type="password" inputmode="numeric"></div><button class="btn btn-primary btn-block" onclick="joinTeam()">Als Spieler beitreten</button></div><button class="btn btn-ghost btn-block" onclick="db.verified=false;save();render()">Anderen Code eingeben</button></div>${sheet?renderSheet():''}</div>`}
function createTeam(){let n=document.getElementById('name').value.trim(),t=document.getElementById('team').value.trim()||'Meine Mannschaft',p=document.getElementById('pin').value.trim();if(!n||!p)return alert('Bitte Name und PIN angeben.');let id=uid();db.team={name:t,code:code()};db.users=[{id,name:n,pin:p,no:null,admin:true,cash:true}];db.me=id;db.verified=true;db.series=[{id:uid(),weekday:2,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]},{id:uid(),weekday:4,time:'19:00',end:'20:30',place:'',note:'Training',skip:[]}];save();render()}
function verifyCode(){let c=document.getElementById('code').value.trim().toUpperCase();if(c===db.team.code){db.verified=true;save();render()}else alert('Code ist nicht korrekt.')}
function openLoginPin(id){openSheet('loginpin',id)}
function doLogin(){let u=db.users.find(x=>x.id===edit),p=document.getElementById('loginPin').value;if(!u)return;if(String(u.pin||'')!==String(p))return alert('PIN falsch.');db.me=u.id;save();closeSheet();render()}
function joinTeam(){let n=document.getElementById('newName').value.trim(),p=document.getElementById('newPin').value.trim();if(!n||!p)return alert('Bitte Name und PIN angeben.');let id=uid();db.users.push({id,name:n,pin:p,no:null,admin:false,cash:false});db.me=id;save();render()}
function eventCard(e,pastFlag=false){let g=groups(e.id),r=(db.rsvps[e.id]||{})[db.me]||{};let title=e.type==='spiel'?`vs. ${esc(e.opp||'?')}`:esc(e.note||'Training');return `<div class="card ${!pastFlag?'hi':''}"><div class="row"><span class="badge ${e.type}">${e.type==='spiel'?'Spiel':'Training'}</span><span class="muted small">${fmt(e.date)}${e.time?`, ${e.time}${e.end?'-'+e.end:''} Uhr`:''}</span></div><h3 style="margin:10px 0 2px">${title}</h3><div class="muted">${esc(e.place||'')}</div>${!pastFlag?`<div class="btnrow"><button class="btn ${r.s==='yes'?'btn-primary':'btn-ghost'}" onclick="rsvp('${e.id}','yes')">Zusagen</button><button class="btn ${r.s==='no'?'btn-red':'btn-ghost'}" onclick="openSheet('reason','${e.id}')">Absagen</button></div>${r.s?`<button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="clearRsvp('${e.id}')">Antwort zurückziehen</button>`:''}`:''}<div class="muted small" style="margin-top:10px;border-top:1px solid var(--line);padding-top:8px"><span class="ok"><b>Kommt (${g.yes.length}):</b> ${g.yes.map(x=>esc(x.name.split(' ')[0])).join(', ')||'-'}</span><br><span class="danger"><b>Kommt nicht (${g.no.length}):</b> ${g.no.map(x=>esc(x.u.name.split(' ')[0])+(x.reason?' ('+esc(x.reason)+')':'')).join(', ')||'-'}</span><br><b>Offen:</b> ${g.open}</div>${isAdmin()?`<div class="btnrow"><button class="btn btn-ghost" onclick="editEvent('${e.id}')">Bearbeiten</button><button class="btn btn-red" onclick="delEvent('${e.id}')">Löschen</button></div>`:''}</div>`}
function home(){let u=me(),e=upcoming()[0];let ft=db.fines.filter(f=>f.user===u.id&&!f.paid).reduce((s,f)=>s+Number(f.amount),0),bt=db.beers.filter(b=>b.user===u.id&&!b.paid).length;return `<div class="divider"><span class="dot"></span>Nächster Termin<span></span></div>${e?eventCard(e):'<div class="empty">Keine Termine vorhanden.</div>'}<div class="divider"><span class="dot"></span>Dein Konto<span></span></div><div class="card"><div class="row"><span>Strafen offen</span><span class="money">${money(ft)}</span></div><div class="row" style="margin-top:8px"><span>Bier offen</span><span class="beer">${money(bt)}</span></div><button class="btn btn-amber btn-block" style="margin-top:12px" onclick="addBeer('${u.id}')">+ Bier eintragen</button></div>`}
function termine(){let up=upcoming(),pa=past().slice(0,15);return `<div class="divider"><span class="dot"></span>Anstehend<span></span></div>${up.length?up.map(e=>eventCard(e)).join(''):'<div class="empty">Keine anstehenden Termine.</div>'}${pa.length?`<div class="divider"><span class="dot"></span>Vergangen<span></span></div>${pa.map(e=>eventCard(e,true)).join('')}`:''}${isAdmin()?`<div class="divider"><span class="dot"></span>Serientermine<span></span></div><div class="card">${db.series.map(s=>`<div class="player"><div class="grow"><div class="name">${['So','Mo','Di','Mi','Do','Fr','Sa'][s.weekday]} ${s.time}-${s.end}</div><div class="muted small">${esc(s.note||'Training')} · ${esc(s.place||'')}</div></div><button class="btn btn-ghost" onclick="openSheet('series','${s.id}')">Ändern</button><button class="btn btn-red" onclick="delSeries('${s.id}')">X</button></div>`).join('')||'<div class="muted">Keine Serien</div>'}<button class="btn btn-primary btn-block" onclick="openSheet('series')">+ Serie</button></div>`:''}`}
function strafen(){if(!canCash()){let u=me(),mine=db.fines.filter(f=>f.user===u.id).sort((a,b)=>b.date.localeCompare(a.date));return `<div class="divider"><span class="dot"></span>Deine Strafen<span></span></div>${mine.length?mine.map(f=>fineLine(f,false)).join(''):'<div class="empty">Keine Strafen.</div>'}`}let totals=db.users.map(u=>({u,open:db.fines.filter(f=>f.user===u.id&&!f.paid).reduce((s,f)=>s+Number(f.amount),0)})).sort((a,b)=>b.open-a.open);return `<div class="divider"><span class="dot"></span>Teamkonten<span></span></div>${totals.map(t=>`<div class="card"><div class="row"><span>${esc(t.u.name)}</span><span class="money">${money(t.open)}</span></div></div>`).join('')}<div class="divider"><span class="dot"></span>Einträge<span></span></div>${db.fines.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(f=>fineLine(f,true)).join('')||'<div class="empty">Keine Einträge.</div>'}`}
function fineLine(f,admin){let u=db.users.find(x=>x.id===f.user);return `<div class="card"><div class="row"><div><div class="name">${esc(u?.name||'?')}</div><div class="muted small">${esc(f.reason)} · ${fmt(f.date)}</div></div><div style="text-align:right"><div class="money">${money(f.amount)}</div><span class="pill ${f.paid?'paid':'open'}">${f.paid?'bezahlt':'offen'}</span></div></div>${admin?`<div class="btnrow"><button class="btn btn-ghost" onclick="toggleFine('${f.id}')">${f.paid?'Offen':'Bezahlt'}</button><button class="btn btn-ghost" onclick="openSheet('fine','${f.id}')">Bearbeiten</button><button class="btn btn-red" onclick="delFine('${f.id}')">Löschen</button></div>`:''}</div>`}
function bier(){let u=me();let totals=db.users.map(x=>({u:x,open:db.beers.filter(b=>b.user===x.id&&!b.paid).length,paid:db.beers.filter(b=>b.user===x.id&&b.paid).length})).sort((a,b)=>b.open-a.open);return `<div class="divider"><span class="dot"></span>Dein Bierkonto<span></span></div><div class="card hi"><div class="row"><span>${db.beers.filter(b=>b.user===u.id&&!b.paid).length} offen</span><span class="beer">${money(db.beers.filter(b=>b.user===u.id&&!b.paid).length)}</span></div><div class="btnrow"><button class="btn btn-amber" onclick="addBeer('${u.id}')">+ Bier</button><button class="btn btn-ghost" onclick="undoBeer('${u.id}')">Rückgängig</button></div></div><div class="divider"><span class="dot"></span>Team<span></span></div>${totals.map(t=>`<div class="card"><div class="row"><div>${esc(t.u.name)}<div class="muted small">${t.open} offen, ${t.paid} bezahlt</div></div><span class="beer">${money(t.open)}</span></div>${canCash()&&t.open?`<button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="settleBeer('${t.u.id}')">Abrechnen</button>`:''}</div>`).join('')}`}
function kader(){return `<div class="divider"><span class="dot"></span>${db.users.length} im Kader<span></span></div><div class="card">${db.users.map(u=>`<div class="player"><div class="avatar ${u.admin?'admin':''}">${u.no||initials(u.name)}</div><div class="grow"><div class="name">${esc(u.name)}${u.id===db.me?' (du)':''}</div><div class="muted small">${u.admin?'Admin':'Spieler'}${u.cash&&!u.admin?' · Kassenwart':''}</div></div><button class="btn btn-primary" onclick="openLoginPin('${u.id}')">Anmelden</button>${isAdmin()?`<button class="btn btn-ghost" onclick="openSheet('editUser','${u.id}')">Ändern</button>`:''}</div>`).join('')}</div>`}
function renderSheet(){if(sheet==='loginpin'){let u=db.users.find(x=>x.id===edit);return sh(`Anmelden`, `<div class="field"><label>Spieler</label><input value="${esc(u?.name||'')}" readonly></div><div class="field"><label>PIN</label><input id="loginPin" type="password" inputmode="numeric" autofocus></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="doLogin()">Anmelden</button></div>`)}
if(sheet==='profile'){let u=me();return sh('Dein Profil',`<div class="field"><label>Name</label><input id="pfName" value="${esc(u.name)}"></div><div class="field"><label>Trikotnummer</label><input id="pfNo" value="${esc(u.no||'')}"></div><div class="field"><label>Neue PIN optional</label><input id="pfPin" type="password" inputmode="numeric" placeholder="leer lassen = unverändert"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="saveProfile()">Speichern</button></div><div class="btnrow"><button class="btn btn-ghost" onclick="db.me=null;save();render()">Benutzer wechseln</button><button class="btn btn-red" onclick="resetLocalLogin()">Abmelden</button></div>`)}
if(sheet==='team'){let link=location.origin+location.pathname+'?invite='+db.team.code;return sh('Team',`${isAdmin()?`<div class="field"><label>Teamname</label><input id="tmName" value="${esc(db.team.name)}"></div><div class="field"><label>Einladungscode</label><input value="${esc(db.team.code)}" readonly onclick="this.select()"></div><div class="field"><label>Einladungslink</label><input value="${esc(link)}" readonly onclick="this.select()"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Schließen</button><button class="btn btn-primary" onclick="saveTeam()">Speichern</button></div><button class="btn btn-ghost btn-block" onclick="newCode()">Neuen Code erzeugen</button><button class="btn btn-gold btn-block" style="margin-top:8px" onclick="exportData()">Backup exportieren</button><label class="btn btn-ghost btn-block" style="margin-top:8px;text-align:center">Backup importieren<input class="hidden" type="file" accept="application/json" onchange="importData(this.files[0])"></label>`:`<p>${esc(db.team.name)}</p><button class="btn btn-ghost btn-block" onclick="closeSheet()">Schließen</button>`}`)}
if(sheet==='event'){let e=db.events.find(x=>x.id===edit)||{type:'training',date:today(),time:'19:00',end:'20:30'};return sh(edit?'Termin bearbeiten':'Termin anlegen',`<div class="field"><label>Art</label><select id="evType"><option value="training" ${e.type==='training'?'selected':''}>Training</option><option value="spiel" ${e.type==='spiel'?'selected':''}>Spiel</option></select></div><div class="field"><label>Datum</label><input id="evDate" type="date" value="${e.date||today()}"></div><div class="btnrow"><div class="field"><label>Start</label><input id="evTime" type="time" value="${e.time||''}"></div><div class="field"><label>Ende</label><input id="evEnd" type="time" value="${e.end||''}"></div></div><div class="field"><label>Ort</label><input id="evPlace" value="${esc(e.place||'')}"></div><div class="field"><label>Gegner bei Spiel</label><input id="evOpp" value="${esc(e.opp||'')}"></div><div class="field"><label>Notiz</label><input id="evNote" value="${esc(e.note||'')}"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="saveEvent()">Speichern</button></div>`)}
if(sheet==='series'){let s=db.series.find(x=>x.id===edit)||{weekday:2,time:'19:00',end:'20:30',place:'',note:'Training'};return sh(edit?'Serie bearbeiten':'Serie anlegen',`<div class="field"><label>Wochentag</label><select id="seWd">${['So','Mo','Di','Mi','Do','Fr','Sa'].map((w,i)=>`<option value="${i}" ${s.weekday==i?'selected':''}>${w}</option>`).join('')}</select></div><div class="btnrow"><div class="field"><label>Start</label><input id="seTime" type="time" value="${s.time}"></div><div class="field"><label>Ende</label><input id="seEnd" type="time" value="${s.end}"></div></div><div class="field"><label>Ort</label><input id="sePlace" value="${esc(s.place||'')}"></div><div class="field"><label>Notiz</label><input id="seNote" value="${esc(s.note||'')}"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="saveSeries()">Speichern</button></div>`)}
if(sheet==='reason')return sh('Absagen',`<div class="field"><label>Grund</label><input id="reason" placeholder="z.B. Arbeit, verletzt, Urlaub"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-red" onclick="saveNo()">Absage speichern</button></div>`)
if(sheet==='fine'){let f=db.fines.find(x=>x.id===edit)||{user:db.users[0]?.id,reason:'',amount:''};return sh(edit?'Strafe bearbeiten':'Strafe vergeben',`<div class="field"><label>Spieler</label><select id="fiUser">${db.users.map(u=>`<option value="${u.id}" ${f.user===u.id?'selected':''}>${esc(u.name)}</option>`).join('')}</select></div><div class="field"><label>Grund</label><input id="fiReason" value="${esc(f.reason)}"></div><div class="field"><label>Betrag EUR</label><input id="fiAmount" type="number" step="0.5" value="${esc(f.amount)}"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-gold" onclick="saveFine()">Speichern</button></div>`)}
if(sheet==='player')return sh('Spieler hinzufügen',`<div class="field"><label>Name</label><input id="plName"></div><div class="field"><label>PIN</label><input id="plPin" type="password" inputmode="numeric"></div><div class="field"><label>Trikotnummer</label><input id="plNo"></div><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="savePlayer()">Hinzufügen</button></div>`)
if(sheet==='editUser'){let u=db.users.find(x=>x.id===edit);return sh('Spieler bearbeiten',`<div class="field"><label>Name</label><input id="euName" value="${esc(u.name)}"></div><div class="field"><label>Trikotnummer</label><input id="euNo" value="${esc(u.no||'')}"></div><div class="field"><label>Neue PIN optional</label><input id="euPin" type="password" inputmode="numeric"></div><label><input type="checkbox" id="euAdmin" ${u.admin?'checked':''}> Admin</label><br><label><input type="checkbox" id="euCash" ${u.cash?'checked':''}> Kassenwart</label><div class="btnrow"><button class="btn btn-ghost" onclick="closeSheet()">Abbrechen</button><button class="btn btn-primary" onclick="saveEditUser()">Speichern</button></div><button class="btn btn-red btn-block" onclick="delUser('${u.id}')">Spieler löschen</button>`)}return ''}
function sh(t,b){return `<div class="sheetBg" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()"><h3>${t}</h3>${b}</div></div>`}
function rsvp(id,s){db.rsvps[id]=db.rsvps[id]||{};db.rsvps[id][db.me]={s};save();render()}function clearRsvp(id){if(db.rsvps[id])delete db.rsvps[id][db.me];save();render()}function saveNo(){let v=document.getElementById('reason').value.trim();if(!v)return alert('Bitte Grund angeben.');db.rsvps[edit]=db.rsvps[edit]||{};db.rsvps[edit][db.me]={s:'no',reason:v};save();closeSheet();render()}
function saveEvent(){let o={id:edit||uid(),type:evType.value,date:evDate.value,time:evTime.value,end:evEnd.value,place:evPlace.value.trim(),opp:evOpp.value.trim(),note:evNote.value.trim()};if(!o.date)return alert('Datum fehlt.');if(edit){let i=db.events.findIndex(x=>x.id===edit);db.events[i]=o}else db.events.push(o);save();closeSheet();render()}function editEvent(id){if(id.startsWith('ser:'))return alert('Das ist ein Serientermin. Die Serie kannst du unten bearbeiten.');openSheet('event',id)}function delEvent(id){if(id.startsWith('ser:')){let [_,sid,d]=id.split(':');let s=db.series.find(x=>x.id===sid);if(s){s.skip=s.skip||[];s.skip.push(d)}}else db.events=db.events.filter(x=>x.id!==id);save();render()}
function saveSeries(){let o={id:edit||uid(),weekday:Number(seWd.value),time:seTime.value,end:seEnd.value,place:sePlace.value.trim(),note:seNote.value.trim(),skip:[]};if(edit){let old=db.series.find(x=>x.id===edit);o.skip=old?.skip||[];db.series[db.series.findIndex(x=>x.id===edit)]=o}else db.series.push(o);save();closeSheet();render()}function delSeries(id){if(confirm('Serie komplett löschen?')){db.series=db.series.filter(x=>x.id!==id);save();render()}}
function saveFine(){let o={id:edit||uid(),user:fiUser.value,reason:fiReason.value.trim(),amount:Number(fiAmount.value),date:today(),paid:false};if(!o.reason||!o.amount)return alert('Grund und Betrag fehlen.');if(edit){let f=db.fines.find(x=>x.id===edit);Object.assign(f,o,{paid:f.paid,date:f.date})}else db.fines.push(o);save();closeSheet();render()}function toggleFine(id){let f=db.fines.find(x=>x.id===id);if(f)f.paid=!f.paid;save();render()}function delFine(id){db.fines=db.fines.filter(x=>x.id!==id);save();render()}
function addBeer(id){db.beers.push({id:uid(),user:id,date:today(),paid:false});save();render()}function undoBeer(id){let b=db.beers.filter(x=>x.user===id&&!x.paid).pop();if(b)db.beers=db.beers.filter(x=>x.id!==b.id);save();render()}function settleBeer(id){db.beers.forEach(b=>{if(b.user===id&&!b.paid)b.paid=true});save();render()}
function savePlayer(){let n=plName.value.trim(),p=plPin.value.trim();if(!n||!p)return alert('Name und PIN fehlen.');db.users.push({id:uid(),name:n,pin:p,no:plNo.value.trim()||null,admin:false,cash:false});save();closeSheet();render()}function saveEditUser(){let u=db.users.find(x=>x.id===edit);u.name=euName.value.trim();u.no=euNo.value.trim()||null;if(euPin.value.trim())u.pin=euPin.value.trim();u.admin=euAdmin.checked;u.cash=euCash.checked;save();closeSheet();render()}function delUser(id){if(id===db.me)return alert('Dich selbst bitte nicht löschen.');if(confirm('Spieler löschen?')){db.users=db.users.filter(x=>x.id!==id);save();render()}}
function saveProfile(){let u=me();u.name=pfName.value.trim();u.no=pfNo.value.trim()||null;if(pfPin.value.trim())u.pin=pfPin.value.trim();save();closeSheet();render()}function saveTeam(){db.team.name=tmName.value.trim()||db.team.name;save();closeSheet();render()}function newCode(){if(confirm('Neuen Code erzeugen? Alte Links funktionieren dann nicht mehr.')){db.team.code=code();save();render()}}
function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='mannschaft-backup.json';a.click()}function importData(file){if(!file)return;let r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);save();render()}catch(e){alert('Backup konnte nicht gelesen werden.')}};r.readAsText(file)}
initStorage();load();render();
</script></body></html>
